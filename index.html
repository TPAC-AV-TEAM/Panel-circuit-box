<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AV 迴路盒查詢 | V5</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg:     #000000;
            --card:   rgba(28,28,30,0.95);
            --blue:   #0A84FF;
            --green:  #32D74B;
            --text:   #F5F5F7;
            --sub:    #8E8E93;
            --border: rgba(255,255,255,0.1);
            --sep:    rgba(255,255,255,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "SF Pro Display", "Inter", "-apple-system", sans-serif;
            min-height: 100vh;
            /* 行動端底部安全距離防護 */
            padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Header ── */
        .header {
            width: 100%;
            padding: 52px 16px 16px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 0.5px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            text-align: center;
        }
        .header h1 {
            font-size: 26px; font-weight: 700;
            background: linear-gradient(180deg,#fff 0%,#8E8E93 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        /* ── Search bar ── */
        .search-bar { display:flex; gap:8px; align-items:center; max-width:540px; margin:0 auto; }
        .search-wrap { position:relative; flex:1; }
        .search-wrap input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            color: #fff; font-size: 16px; outline: none;
            transition: border-color 0.2s;
        }
        .search-wrap input:focus { border-color: var(--blue); }
        
        .icon-btn {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.07);
            border: 0.5px solid var(--border);
            border-radius: 12px;
            color: var(--sub); cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: background 0.15s;
        }
        
        /* 觸控/滑鼠 hover 狀態分離防殘影 */
        @media (hover: hover) {
            .icon-btn:hover { border-color: var(--sub); }
            .sug-item:hover { background: rgba(255,255,255,0.08); }
        }
        .icon-btn:active { background: rgba(255,255,255,0.15); }

        /* ── Suggestions ── */
        .suggestions {
            position: absolute; top: 100%; left: 0; right: 0;
            background: rgba(28,28,30,0.99);
            border: 0.5px solid var(--border);
            border-radius: 14px; margin-top: 6px;
            overflow-y: auto; max-height: 260px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            z-index: 200;
            scrollbar-width: none;
        }
        .suggestions::-webkit-scrollbar { display: none; }
        
        .sug-item {
            padding: 12px 16px; cursor: pointer; font-size: 15px;
            border-bottom: 0.5px solid var(--sep);
            display: flex; justify-content: space-between; align-items: center;
        }
        .sug-item:last-child { border-bottom: none; }
        .sug-item.active, .sug-item:active { background: rgba(255,255,255,0.08); }
        .sug-hall { font-size: 11px; font-weight: 700; }

        /* ── Content ── */
        .content { width: 100%; max-width: 540px; padding: 16px 16px 0; }

        /* ── Card ── */
        .card {
            background: var(--card);
            border: 0.5px solid var(--border);
            border-radius: 20px;
            padding: 20px; margin-bottom: 12px;
        }

        .tag { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--blue); margin-bottom: 6px; }
        .id-label { 
            font-size: 30px; font-weight: 700; letter-spacing: -0.02em; 
            /* 名稱過長防護 */
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .divider { border: none; border-top: 0.5px solid var(--sep); margin: 14px 0; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .info-item .label { font-size: 12px; color: var(--sub); margin-bottom: 4px; }
        .info-item .value { font-size: 17px; font-weight: 600; line-height: 1.3; }

        .hall-badge {
            display: inline-flex; align-items: center;
            padding: 4px 12px; border-radius: 999px;
            font-size: 16px; font-weight: 700; margin-right: 8px;
        }

        /* ── Table ── */
        .section-title { font-size: 11px; color: var(--sub); font-weight: 700; letter-spacing: 0.1em; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th {
            text-align: left; font-size: 12px; color: var(--sub); font-weight: 600;
            padding: 0 4px 8px; border-bottom: 0.5px solid var(--border);
        }
        /* 重配寬度，容納機房名稱 */
        thead th:nth-child(1) { width: 55%; }
        thead th:nth-child(2) { width: 30%; }
        thead th:nth-child(3) { width: 15%; text-align: right; }
        
        tbody tr { border-bottom: 0.5px solid var(--sep); }
        tbody td { 
            padding: 12px 4px; 
            font-size: 16px; 
            font-weight: 500;
            color: var(--text);
            vertical-align: top;
            word-wrap: break-word;
        }
        tbody td:last-child { 
            text-align: right; 
            color: #FFFFFF; 
            font-size: 18px; 
            font-weight: 600;
        }
        .sys-name { font-weight: 600; color: #FFFFFF; }
        .dest-info { 
            font-size: 12px; 
            color: var(--sub); 
            margin-top: 4px; 
            line-height: 1.3; 
            display: flex; gap: 4px; 
        }
        .dest-icon { color: var(--blue); flex-shrink: 0; }

        /* ── Settings ── */
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .settings-title { font-size: 13px; font-weight: 600; color: var(--blue); }
        .settings-actions { display: flex; gap: 8px; align-items: center; }
        .save-btn {
            background: var(--blue); color: #fff; border: none;
            border-radius: 8px; padding: 6px 16px;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .close-settings {
            background: rgba(255,255,255,0.1); color: #fff; border: none;
            border-radius: 8px; width: 30px; height: 30px;
            font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .alias-list { max-height: 340px; overflow-y: auto; scrollbar-width: none; }
        .alias-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 0; border-bottom: 0.5px solid var(--sep);
        }
        .alias-orig { font-size: 13px; color: var(--text); flex: 1; word-break: break-all; min-width: 0; }
        .alias-row input {
            flex: 1; padding: 7px 10px;
            border-radius: 8px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.05); color: #fff;
            outline: none; font-size: 14px; min-width: 0;
            transition: border-color 0.2s;
        }
        .alias-row input:focus { border-color: var(--blue); }

        /* ── Placeholder ── */
        .placeholder { text-align: center; padding: 60px 20px; color: #3a3a3c; font-size: 12px; letter-spacing: 0.15em; }
    </style>
</head>
<body>

<div class="header">
    <h1>音視訊迴路盒</h1>
    <div class="search-bar">
        <div class="search-wrap">
            <input type="text" id="searchInput"
                placeholder="輸入編號，如 AV 01-01"
                autocomplete="off">
            <div id="suggestions" class="suggestions" style="display:none"></div>
        </div>
        <button class="icon-btn" id="clearBtn">✕</button>
        <button class="icon-btn" id="settingBtn">⚙️</button>
    </div>
</div>

<div class="content">
    <div id="settingsArea" class="card" style="display:none; margin-bottom:12px;">
        <div class="settings-header">
            <span class="settings-title">🛠️ 自訂系統名稱</span>
            <div class="settings-actions">
                <button class="save-btn" id="saveBtn">儲存</button>
                <button class="close-settings" id="closeSettingBtn">✕</button>
            </div>
        </div>
        <div id="aliasList" class="alias-list">
            <p style="font-size:13px;color:var(--sub)">載入中…</p>
        </div>
    </div>

    <div id="resultArea" style="display:none"></div>

    <div id="placeholder" class="placeholder">READY TO SCAN</div>
</div>

<script>
/**
 * 核心中央配置 (CENTRAL CONFIG)
 */
const CONFIG = {
    DATA_URL: './data.json',
    STORAGE_KEY: 'avAliases',
    MAX_SUGGESTIONS: 15,
    ANIMATION_MS: 800,
    HALL_MAP: {
        '大劇院':           { short:'GT',   color:'#FF3B30' },
        '多形式中劇院':     { short:'BB',   color:'#5AC8FA' },
        '鏡框式中劇院':     { short:'GP',   color:'#34C759' },
        '偶劇院':           { short:'PT',   color:'#FF9F0A' },
        '屋頂劇場':         { short:'RT',   color:'#BF5AF2' },
        '排練室':           { short:'練',   color:'#64D2FF' },
        '公共區域':         { short:'公共', color:'#8E8E93' },
        '卸貨口與外部空間': { short:'外部', color:'#636366' },
    }
};

/* ── 狀態管理 (State) ── */
let db = [];
let aliases = {};
let sugIdx = -1;
let currentId = null;

/* ── 工具函式 (Helpers) ── */
const safeParse = (str, fallback) => { try { return JSON.parse(str) || fallback; } catch(e) { return fallback; } };
const escHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getEle = id => document.getElementById(id);

function safeGet(key, def) {
    const v = localStorage.getItem(key);
    return v ? safeParse(v, def) : def;
}
function safeSet(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } 
    catch(e) { console.warn('Storage write failed:', e); }
}

/* ── 生命週期與初始化 ── */
window.addEventListener('DOMContentLoaded', initApp);

async function initApp() {
    aliases = safeGet(CONFIG.STORAGE_KEY, {});
    bindEvents();
    await loadData();
}

function bindEvents() {
    const input = getEle('searchInput');
    const sugBox = getEle('suggestions');

    input.addEventListener('input', handleInput);
    input.addEventListener('keydown', handleKey);
    
    getEle('clearBtn').addEventListener('click', clearSearch);
    getEle('settingBtn').addEventListener('click', toggleSettings);
    getEle('closeSettingBtn').addEventListener('click', toggleSettings);
    getEle('saveBtn').addEventListener('click', saveAliases);

    // Event Delegation (消除記憶體洩漏風險)
    sugBox.addEventListener('click', e => {
        const item = e.target.closest('.sug-item');
        if (item && item.dataset.id) {
            selectSug(item.dataset.id);
        }
    });

    document.addEventListener('click', e => { 
        if (!e.target.closest('.search-wrap')) hideSuggestions(); 
    });
}

async function loadData() {
    const input = getEle('searchInput');
    input.disabled = true;
    getEle('placeholder').innerText = '⏳ 載入資料中…';
    
    try {
        const res = await fetch(`${CONFIG.DATA_URL}?v=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        db = await res.json();
        buildAliasEditor();
        getEle('placeholder').innerText = 'READY TO SCAN';
    } catch(e) {
        console.error(e);
        getEle('placeholder').innerText = '⚠️ 無法載入資料，請確認網路連線';
    } finally {
        input.disabled = false;
        input.focus();
    }
}

/* ── 搜尋邏輯 ── */
function buildCandidates(raw) {
    const s = raw.trim().toUpperCase();
    if (!s) return [];
    const set = new Set([s]);
    const noPrefix = s.replace(/^AV\s*/, '');
    set.add('AV ' + noPrefix);
    set.add('AV ' + noPrefix.replace(/^(\d{2})(\d{2})$/, '$1-$2')); 
    return Array.from(set);
}

function handleInput() {
    const val = getEle('searchInput').value;
    sugIdx = -1;
    
    if (!val.trim()) { clearSearch(); return; }
    
    const candidates = buildCandidates(val);
    const q = val.trim().toUpperCase();
    const seen = new Set();
    const sugs = [];
    
    for (const d of db) {
        if (!d || !d.id) continue;
        
        if (seen.has(d.id)) continue;
        const id = d.id.toUpperCase();
        
        if (candidates.some(c => id === c) || id.includes(q)) {
            seen.add(d.id);
            sugs.push(d);
        }
        if (sugs.length >= CONFIG.MAX_SUGGESTIONS) break;
    }
    
    if (!sugs.length) { 
        hideSuggestions(); 
        showPlaceholder('查無此編號'); 
        return; 
    }

    sugs.sort((a, b) => {
        const aExact = candidates.some(c => a.id.toUpperCase() === c);
        const bExact = candidates.some(c => b.id.toUpperCase() === c);
        return (bExact ? 1 : 0) - (aExact ? 1 : 0);
    });

    if (sugs.length === 1 && candidates.some(c => sugs[0].id.toUpperCase() === c)) {
        hideSuggestions(); 
        renderResult(sugs[0].id); 
        return;
    }
    
    renderSuggestions(sugs);
}

function handleKey(e) {
    const box = getEle('suggestions');
    const items = box.querySelectorAll('.sug-item');
    
    if (box.style.display === 'none' || !items.length) {
        if (e.key === 'Enter') handleInput();
        return;
    }
    
    if (e.key === 'ArrowDown') { 
        sugIdx = Math.min(sugIdx + 1, items.length - 1); 
        highlightSug(items); 
        e.preventDefault(); 
    } else if (e.key === 'ArrowUp') { 
        sugIdx = Math.max(sugIdx - 1, -1); 
        highlightSug(items); 
        e.preventDefault(); 
    } else if (e.key === 'Enter') { 
        sugIdx >= 0 ? items[sugIdx].click() : handleInput(); 
    }
}

function highlightSug(items) {
    items.forEach((el, i) => el.classList.toggle('active', i === sugIdx));
    if (sugIdx >= 0) items[sugIdx].scrollIntoView({ block: 'nearest' });
}

function renderSuggestions(sugs) {
    const box = getEle('suggestions');
    const unique = [...new Map(sugs.map(d => [d.id, d])).values()];
    
    box.innerHTML = unique.map(d => {
        const hall = CONFIG.HALL_MAP[d.hall] || { short: d.hall || '?', color: '#8E8E93' };
        return `
            <div class="sug-item" data-id="${escHtml(d.id)}">
                <span>${escHtml(d.id)}</span>
                <span class="sug-hall" style="color:${hall.color}">${escHtml(hall.short)}</span>
            </div>
        `;
    }).join('');
    
    box.style.display = 'block';
}

function hideSuggestions() { 
    getEle('suggestions').style.display = 'none'; 
}

function selectSug(id) { 
    getEle('searchInput').value = id; 
    hideSuggestions(); 
    renderResult(id); 
}

/* ── 核心渲染 (處理目的地聚合邏輯) ── */
function renderResult(id) {
    if (!id) return;
    const matches = db.filter(d => d.id === id);
    if (!matches.length) { showPlaceholder('查無此編號'); return; }
    
    currentId = id; 
    const first = matches[0];
    const hall = CONFIG.HALL_MAP[first.hall] || { short: first.hall || '?', color: '#8E8E93' };

    const groups = new Map();
    for (const d of matches) {
        // 動態判定，確保防禦
        const sys = (d.sys && (aliases[d.sys] || d.sys)) || '未命名系統';
        const conn = d.conn || '—';
        const dest = d.dest ? d.dest.trim() : '';
        const room = d.room ? d.room.trim() : '';
        const destInfo = [dest, room].filter(Boolean).join(' ') || '未標示目的地';
        
        // 分組邏輯：系統、接頭、目的地需一併作為分組條件，確保數量累加正確
        const key = `${sys}§${conn}§${destInfo}`;
        
        if (!groups.has(key)) {
            groups.set(key, { sys, conn, destInfo, qty: 0 });
        }
        
        const q = parseInt(d.qty, 10);
        groups.get(key).qty += isNaN(q) ? 0 : q;
    }

    const tableRows = [...groups.values()]
        .sort((a, b) => a.sys.localeCompare(b.sys, 'zh-TW'))
        .map(g => `
            <tr>
                <td>
                    <div class="sys-name">${escHtml(g.sys)}</div>
                    <div class="dest-info">
                        <span class="dest-icon">↳</span> 
                        <span>${escHtml(g.destInfo)}</span>
                    </div>
                </td>
                <td>${g.conn !== '—' ? escHtml(g.conn) : ''}</td>
                <td>${g.qty || '0'}</td>
            </tr>
        `).join('');

    getEle('resultArea').innerHTML = `
        <div class="card">
            <div class="tag">SYSTEM SCAN OK</div>
            <div class="id-label">${escHtml(first.id)}</div>
            <hr class="divider">
            <div class="info-grid">
                <div class="info-item">
                    <div class="label">廳別</div>
                    <div class="value">
                        <span class="hall-badge" style="background:${hall.color}22;color:${hall.color}">${escHtml(hall.short)}</span>
                        <span style="font-size:20px; color:var(--text); font-weight:500;">${escHtml(first.hall || '—')}</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="label">位置</div>
                    <div class="value" style="font-size:16px">${escHtml(first.loc || '—')}</div>
                </div>
            </div>
        </div>
        <div class="card">
            <p class="section-title">接口清單 / INTERFACE LIST</p>
            <table>
                <thead>
                    <tr>
                        <th>系統 / 目的地</th>
                        <th>接頭</th>
                        <th>數量</th>
                    </tr>
                </thead>
                <tbody>${tableRows}</tbody>
            </table>
        </div>`;
        
    getEle('resultArea').style.display = 'block';
    getEle('placeholder').style.display = 'none';
}

function showPlaceholder(msg) {
    currentId = null;
    getEle('resultArea').style.display = 'none';
    const el = getEle('placeholder');
    el.style.display = 'block'; 
    el.innerText = msg;
}

function clearSearch() {
    getEle('searchInput').value = '';
    currentId = null;
    hideSuggestions(); 
    showPlaceholder('READY TO SCAN');
}

/* ── 設定與 Alias ── */
function buildAliasEditor() {
    const systems = [...new Set(db.map(d => d.sys).filter(Boolean))].sort();
    getEle('aliasList').innerHTML = systems.map(s => `
        <div class="alias-row">
            <span class="alias-orig">${escHtml(s)}</span>
            <input class="alias-input" data-orig="${escHtml(s)}" value="${escHtml(aliases[s] || '')}" placeholder="自訂名稱">
        </div>`).join('');
}

function saveAliases() {
    document.querySelectorAll('.alias-input').forEach(el => {
        const v = el.value.trim();
        const orig = el.dataset.orig;
        if (v) aliases[orig] = v;
        else delete aliases[orig];
    });
    
    safeSet(CONFIG.STORAGE_KEY, aliases);
    
    const btn = getEle('saveBtn');
    btn.innerText = '✅ 已儲存'; 
    btn.style.background = 'var(--green)';
    
    setTimeout(() => {
        btn.innerText = '儲存'; 
        btn.style.background = 'var(--blue)';
        toggleSettings();
    }, CONFIG.ANIMATION_MS);
    
    if (currentId) renderResult(currentId); 
}

function toggleSettings() {
    const el = getEle('settingsArea');
    const isHidden = el.style.display === 'none';
    el.style.display = isHidden ? 'block' : 'none';
    if (isHidden) hideSuggestions();
}
</script>
</body>
</html>
