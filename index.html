<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AV 迴路盒查詢 | V9.1 Pro (UI/UX Refined)</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        /* ── 核心色彩系統 (UI 重構重點) ── */
        :root {
            --bg:          #000000;
            --card:        #151517; /* 更有質感的深曜灰 */
            --card-border: rgba(255, 255, 255, 0.12); /* 提升卡片邊緣對比 */
            --blue:        #0A84FF;
            --blue-glow:   rgba(10, 132, 255, 0.25);
            --green:       #32D74B;
            
            --text-main:   #FFFFFF; /* 純白，主視覺 */
            --text-sub:    #A1A1A8; /* 提亮後的次要灰 (原 #8E8E93) */
            --text-mute:   #C7C7CC; /* 用於清單內文補充，比 sub 更亮一點 */
            
            --border:      rgba(255,255,255,0.18); /* 提升所有邊框的可見度 */
            --sep:         rgba(255,255,255,0.08); /* 分隔線 */
            --input-bg:    rgba(255,255,255,0.08); /* 輸入框底色 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg); color: var(--text-main);
            font-family: "SF Pro Display", "Inter", "-apple-system", sans-serif;
            min-height: 100vh; padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
            display: flex; flex-direction: column; align-items: center;
        }

        /* ── Header ── */
        .header {
            width: 100%; padding: 52px 16px 16px; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; text-align: center;
        }
        .header h1 {
            font-size: 26px; font-weight: 700; background: linear-gradient(180deg,#FFFFFF 0%,#A1A1A8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 18px;
            letter-spacing: 0.02em;
        }

        /* ── Search Group ── */
        .search-group { display: flex; flex-direction: column; gap: 12px; max-width: 540px; margin: 0 auto; }
        .search-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        
        .search-wrap { position: relative; flex: 1; }
        .search-wrap input {
            width: 100%; background: var(--input-bg); border: 1.5px solid transparent;
            border-radius: 14px; padding: 14px 16px; color: var(--text-main); font-size: 16px; 
            outline: none; transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            box-shadow: inset 0 0 0 0.5px var(--border);
        }
        /* 輸入框焦點光暈特效 */
        .search-wrap input:focus { 
            background: rgba(255,255,255,0.12); 
            border-color: var(--blue);
            box-shadow: 0 0 0 3px var(--blue-glow);
        }
        .search-wrap input::placeholder { color: rgba(255,255,255,0.45); font-weight: 400; }
        
        .icon-btn {
            width: 48px; height: 48px; background: var(--input-bg);
            border: 0.5px solid var(--border); border-radius: 14px;
            color: var(--text-sub); cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: all 0.2s;
        }
        @media (hover: hover) { 
            .icon-btn:hover { border-color: var(--text-sub); color: var(--text-main); background: rgba(255,255,255,0.12); } 
            .sug-item:hover { background: rgba(255,255,255,0.08); } 
            .id-chip:hover { background: rgba(10, 132, 255, 0.2); border-color: var(--blue); } 
        }
        .icon-btn:active { background: rgba(255,255,255,0.2); transform: scale(0.94); }

        /* ── Filters & Chips ── */
        .filter-panel { 
            background: rgba(255,255,255,0.04); border: 1px solid var(--card-border); 
            border-radius: 16px; padding: 14px; width: 100%; 
        }
        .filter-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-sub); font-weight: 600; letter-spacing: 0.08em; margin-bottom: 12px; padding: 0 4px; }
        .clear-filter-btn { color: var(--blue); background: none; border: none; font-size: 12px; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: background 0.2s; }
        .clear-filter-btn:active { background: rgba(10, 132, 255, 0.15); }
        
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        select.filter-select, .filter-input {
            width: 100%; background: var(--input-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 10px; color: var(--text-main); font-size: 15px; outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        select.filter-select {
            appearance: none; -webkit-appearance: none; font-weight: 500;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23A1A1A8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 10px center; background-size: 16px;
            padding-right: 30px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
        }
        select.filter-select:focus, .filter-input:focus { border-color: var(--blue); background: rgba(255,255,255,0.12); }
        .filter-input::placeholder { color: rgba(255,255,255,0.45); }

        .id-chips-container { margin-top: 14px; padding-top: 14px; border-top: 0.5px solid var(--sep); display: flex; flex-wrap: wrap; gap: 8px; max-height: 160px; overflow-y: auto; }
        .id-chips-container:empty { display: none; }
        .id-chip { 
            background: rgba(255,255,255,0.08); border: 1px solid var(--border); 
            border-radius: 10px; padding: 8px 14px; font-size: 15px; font-weight: 600; 
            color: var(--text-main); cursor: pointer; transition: all 0.2s; 
            animation: fadeInScale 0.2s ease-out forwards; opacity: 0; transform: scale(0.95); 
        }
        .id-chip:active { transform: scale(0.92); background: var(--blue); color: var(--text-main); border-color: var(--blue); }
        @keyframes fadeInScale { to { opacity: 1; transform: scale(1); } }
        .chip-empty-msg { width: 100%; text-align: center; font-size: 13px; color: var(--text-sub); padding: 10px 0; }
        
        .result-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .result-chips .id-chip { opacity: 1; transform: scale(1); animation: none; }
        .result-meta { font-size: 13px; color: var(--text-sub); margin-top: 6px; font-weight: 500; }

        /* ── Suggestions ── */
        .suggestions { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: rgba(28,28,30,0.98); border: 1px solid var(--card-border); border-radius: 16px; overflow-y: auto; max-height: 40vh; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 200; display: none; }
        .sug-item { padding: 14px 16px; cursor: pointer; border-bottom: 0.5px solid var(--sep); display: flex; flex-direction: column; gap: 6px; }
        .sug-header { display: flex; justify-content: space-between; align-items: center; font-size: 16px; letter-spacing: 0.02em; }
        .sug-hall { font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 8px; }
        .sug-loc { font-size: 13px; color: var(--text-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }

        /* ── Content & Card ── */
        .content { width: 100%; max-width: 540px; padding: 20px 16px 0; }
        .card { 
            background: var(--card); border: 1px solid var(--card-border); 
            border-radius: 20px; padding: 22px; margin-bottom: 16px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: fadeIn 0.3s ease-out; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        .tag { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--blue); margin-bottom: 8px; }
        .id-label { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main); }
        .divider { border: none; border-top: 1px solid var(--sep); margin: 16px 0; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .info-item .label { font-size: 13px; color: var(--text-sub); margin-bottom: 6px; font-weight: 500; }
        .info-item .value { font-size: 17px; font-weight: 600; line-height: 1.4; color: var(--text-main); }
        .hall-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 999px; font-size: 16px; font-weight: 700; margin-right: 8px; }

        /* ── Table (重構閱讀體驗) ── */
        .section-title { font-size: 12px; color: var(--text-sub); font-weight: 700; letter-spacing: 0.12em; margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th { 
            text-align: left; font-size: 13px; color: var(--text-sub); font-weight: 600; 
            padding: 0 4px 10px; border-bottom: 1px solid var(--border); letter-spacing: 0.05em; 
        }
        thead th:nth-child(1) { width: 55%; }
        thead th:nth-child(2) { width: 30%; }
        thead th:nth-child(3) { width: 15%; text-align: right; }
        
        tbody tr { border-bottom: 1px solid var(--sep); }
        tbody td { padding: 14px 4px; font-size: 16px; font-weight: 500; color: var(--text-main); vertical-align: top; word-wrap: break-word; }
        tbody td:last-child { text-align: right; font-size: 18px; font-weight: 600; color: var(--text-main); }
        
        .sys-name { font-weight: 600; color: var(--text-main); letter-spacing: 0.01em; line-height: 1.4; }
        .dest-info { font-size: 13px; color: var(--text-mute); margin-top: 6px; line-height: 1.4; display: flex; gap: 6px; }
        .dest-icon { color: var(--blue); flex-shrink: 0; font-weight: bold; }

        /* ── Settings ── */
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .save-btn { background: var(--blue); color: var(--text-main); border: none; border-radius: 10px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .close-settings { background: rgba(255,255,255,0.1); color: var(--text-main); border: none; border-radius: 10px; width: 34px; height: 34px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .alias-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--sep); }
        .alias-orig { font-size: 14px; color: var(--text-mute); flex: 1; word-break: break-all; min-width: 0; line-height: 1.3; }
        .alias-row input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-main); outline: none; font-size: 15px; min-width: 0; transition: border-color 0.2s; }
        .alias-row input:focus { border-color: var(--blue); }
        .placeholder { text-align: center; padding: 80px 20px; color: var(--text-sub); font-size: 14px; font-weight: 500; letter-spacing: 0.15em; }
    </style>
</head>
<body>

<div class="header">
    <h1>音視訊迴路盒</h1>
    <div class="search-group">
        <div class="search-row">
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="輸入編號 或 關鍵字 (如: 04-01, Twist)" autocomplete="off">
                <div id="suggestions" class="suggestions"></div>
            </div>
            <button class="icon-btn" id="clearBtn" title="清除">✕</button>
            <button class="icon-btn" id="settingBtn" title="設定">⚙️</button>
        </div>

        <div class="filter-panel">
            <div class="filter-header">
                <span>📍 空間與條件過濾器</span>
                <button class="clear-filter-btn" id="clearFilterBtn">重置條件</button>
            </div>
            <div class="filter-grid">
                <select id="selHall" class="filter-select"><option value="">🏛️ 廳別</option></select>
                <select id="selFloor" class="filter-select"><option value="">📶 樓層</option></select>
                <select id="selLoc" class="filter-select"><option value="">🎯 位置</option></select>
                <input type="text" id="selKeyword" class="filter-input" placeholder="🔍 指定條件 (接頭/線材)" autocomplete="off">
            </div>
            <div id="filterIdChips" class="id-chips-container"></div>
        </div>
    </div>
</div>

<div class="content">
    <div id="settingsArea" class="card" style="display:none; margin-bottom:16px;">
        <div class="settings-header">
            <span style="font-size:15px; font-weight:600; color:var(--blue);">🛠️ 自訂系統名稱 (Alias)</span>
            <div style="display:flex; gap:10px;">
                <button class="save-btn" id="saveBtn">儲存</button>
                <button class="close-settings" id="closeSettingBtn">✕</button>
            </div>
        </div>
        <div id="aliasList" style="max-height:400px; overflow-y:auto; padding-right:4px;"></div>
    </div>

    <div id="resultArea" style="display:none"></div>
    <div id="placeholder" class="placeholder">READY TO SCAN</div>
</div>

<script>
const CONFIG = {
    DATA_URL: './data.json',
    STORAGE_KEY: 'avAliases',
    MAX_SUGGESTIONS: 15,
    HALL_MAP: {
        '大劇院':           { name: 'GT 大劇院',   short: 'GT', color: '#FF3B30', order: 1 },
        '多形式中劇院':     { name: 'BB 藍盒子',   short: 'BB', color: '#5AC8FA', order: 2 },
        '鏡框式中劇院':     { name: 'GP 球劇場',   short: 'GP', color: '#34C759', order: 3 },
        '偶劇院':           { name: 'PT 偶劇院',   short: 'PT', color: '#FF9F0A', order: 4 },
        '排練室':           { name: '排練室',      short: '練', color: '#64D2FF', order: 5 },
        '屋頂劇場':         { name: 'RT 屋頂劇場', short: 'RT', color: '#BF5AF2', order: 6 },
        '公共區域':         { name: '公共區域',    short: '公共', color: '#8E8E93', order: 7 },
        '卸貨口與外部空間': { name: '外部空間',    short: '外部', color: '#636366', order: 8 },
    }
};

let db = [];
let uniqueBoxes = []; 
let aliases = {};
let currentId = null;
let idSearchIndex = new Map();

const escHtml = s => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
const safeParse = (str, fb) => { try { return JSON.parse(str) || fb; } catch(e) { return fb; } };
const getEle = id => document.getElementById(id);
const escapeRegExp = s => String(s ?? '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
const normalizeForMatch = s => String(s ?? '').toUpperCase().replace(/[^A-Z0-9\u4E00-\u9FFF]/g, '');
const tokenizeQuery = q => String(q ?? '')
    .split(/[\s,，、;:\/\\|]+/)
    .map(t => normalizeForMatch(t))
    .filter(Boolean);

window.addEventListener('DOMContentLoaded', async () => {
    aliases = safeParse(localStorage.getItem(CONFIG.STORAGE_KEY), {});
    bindEvents();
    await loadData();
});

function normalizeSearchInput(rawVal) {
    let val = rawVal.trim().toUpperCase();
    if (!val) return '';
    if (/^\d{4}$/.test(val)) return `AV ${val.substring(0, 2)}-${val.substring(2)}`;
    if (/^\d{2}-\d{2}/.test(val)) return `AV ${val}`;
    val = val.replace(/^AV\s*/, 'AV ');
    val = val.replace(/^AV\s*(\d{2})(\d{2})/, 'AV $1-$2');
    return val;
}

function isIdLike(val) {
    return /^#\d+$/i.test(val) || /^AV\s*\d{2}-\d{2}(?:\.\d+)?$/i.test(val);
}

function buildSearchIndex() {
    const map = new Map();
    db.forEach(d => {
        const id = d.id;
        if (!id) return;
        const hall = d.hall || '';
        const hallShort = CONFIG.HALL_MAP[hall]?.short || '';
        const fields = [
            id, hall, hallShort,
            d._floor || '',
            d._exactLoc || d.loc || '',
            d.sys || '',
            aliases[d.sys] || '',
            d.dest || '',
            d.room || '',
            d.conn || '',
            d.rack || '',
            d.dev || ''
        ];
        const norm = normalizeForMatch(fields.join(' '));
        map.set(id, (map.get(id) || '') + norm);
    });
    idSearchIndex = map;
}

function fuzzyMatchIds(query) {
    const tokens = tokenizeQuery(query);
    if (!tokens.length) return [];
    return uniqueBoxes.filter(d => {
        const idx = idSearchIndex.get(d.id) || '';
        return tokens.every(t => idx.includes(t));
    });
}

function renderListResults(list, query) {
    currentId = null;
    const ids = list.map(d => d.id).sort((a,b) => a.localeCompare(b));
    if (!ids.length) return showPlaceholder('查無符合條件的迴路盒');
    const chips = ids.map((id, i) => 
        `<div class="id-chip" data-id="${escHtml(id)}" style="opacity:1;transform:scale(1);animation:none;animation-delay:${i*0.01}s">${escHtml(id)}</div>`
    ).join('');
    getEle('resultArea').innerHTML = `
        <div class="card">
            <div class="tag">FUZZY MATCH / 模糊搜尋結果</div>
            <div class="id-label" style="font-size:22px; color:var(--text-main);">${escHtml(query)}</div>
            <div class="result-meta">符合條件 ${ids.length} 筆（點選可進入詳情）</div>
            <div class="result-chips">${chips}</div>
        </div>`;
    getEle('resultArea').style.display = 'block';
    getEle('placeholder').style.display = 'none';
}

function bindEvents() {
    const searchInput = getEle('searchInput');
    searchInput.addEventListener('input', handleMainInput);
    
    searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const raw = searchInput.value;
            const val = normalizeSearchInput(raw);
            if (!val) return;
            getEle('suggestions').style.display = 'none';
            if (isIdLike(val)) {
                triggerSearch(val);
            } else {
                renderListResults(fuzzyMatchIds(raw), raw.trim());
            }
        }
    });

    getEle('clearBtn').addEventListener('click', () => { getEle('searchInput').value = ''; getEle('suggestions').style.display = 'none'; showPlaceholder('READY TO SCAN'); });
    getEle('clearFilterBtn').addEventListener('click', resetFilters);
    getEle('settingBtn').addEventListener('click', () => getEle('settingsArea').style.display = getEle('settingsArea').style.display==='none'?'block':'none');
    getEle('closeSettingBtn').addEventListener('click', () => getEle('settingsArea').style.display = 'none');
    getEle('saveBtn').addEventListener('click', saveAliases);

    ['selHall', 'selFloor', 'selLoc'].forEach(id => {
        getEle(id).addEventListener('change', updateFilters);
    });
    getEle('selKeyword').addEventListener('input', updateFilters);

    document.addEventListener('click', e => {
        const sug = e.target.closest('.sug-item');
        if (sug && sug.dataset.id) return triggerSearch(sug.dataset.id);

        const chip = e.target.closest('.id-chip');
        if (chip && chip.dataset.id) return triggerSearch(chip.dataset.id);

        if (!e.target.closest('.search-wrap')) getEle('suggestions').style.display = 'none';
    });
}

async function loadData() {
    try {
        const res = await fetch(`${CONFIG.DATA_URL}?v=${Date.now()}`);
        const rawDb = await res.json();
        
        db = rawDb.map(d => {
            let rawId = (d.id || '').trim().toUpperCase();
            let stdId = rawId.replace(/^AV\s*/, 'AV ');

            let floor = '';
            let exactLoc = (d.loc || '').trim();
            
            const floorMatch = exactLoc.match(/(?:^|[^a-zA-Z0-9])([B]?\d{1,2}[M]?F|RF)(?![a-zA-Z0-9])/i);
            
            if (floorMatch) {
                floor = floorMatch[1].toUpperCase();
                exactLoc = exactLoc.replace(floorMatch[1], '').replace(/^[-\s]+/, '').trim(); 
            } else {
                const roomMatch = exactLoc.match(/^0?(\d{1,2})\.\d{2}/);
                if (roomMatch) {
                    floor = roomMatch[1] + 'F';
                } else {
                    const idMatch = stdId.match(/^AV\s*(\d{1,2})([M]?)/i);
                    if (idMatch) {
                        floor = idMatch[1] + (idMatch[2].toUpperCase() === 'M' ? 'MF' : 'F');
                    }
                }
            }

            // 【V9 防彈升級】無論是 05-61 還是 5-61，強制收編至 5MF
            if (/0?5\s*[-_.]\s*6[1-6]/i.test(stdId)) {
                floor = '5MF';
            }

            if (floor) floor = floor.replace(/^(B?)0+(\d+.*)/, '$1$2');

            return { ...d, id: stdId, _floor: floor || '未知樓層', _exactLoc: exactLoc || '一般區域' };
        });

        const seenIds = new Set();
        uniqueBoxes = db.filter(d => {
            if (!d.id || seenIds.has(d.id)) return false;
            seenIds.add(d.id); return true;
        });

        buildAliasEditor();
        populateInitialFilters(); 
        buildSearchIndex();
    } catch(e) { showPlaceholder('⚠️ 無法載入資料，請確認網路連線'); }
}

function populateInitialFilters() {
    updateDropdownOptions('selHall', uniqueBoxes.map(d => d.hall));
    updateDropdownOptions('selFloor', uniqueBoxes.map(d => d._floor));
    updateDropdownOptions('selLoc', uniqueBoxes.map(d => d._exactLoc));
}

function getFloorWeight(floorStr) {
    if (!floorStr || floorStr === '未知樓層') return 999;
    if (floorStr === 'RF') return 100; 
    let weight = parseInt(floorStr.replace(/\D/g, ''), 10) || 0;
    if (floorStr.startsWith('B')) weight = -weight; 
    if (floorStr.includes('M')) weight += 0.5;
    return weight;
}

function updateDropdownOptions(selectId, dataArray) {
    const sel = getEle(selectId);
    const currentVal = sel.value;
    const defaultText = sel.options[0].text; 
    let uniqueVals = [...new Set(dataArray.filter(Boolean))];
    
    if (selectId === 'selHall') {
        uniqueVals.sort((a, b) => {
            const orderA = CONFIG.HALL_MAP[a]?.order || 99;
            const orderB = CONFIG.HALL_MAP[b]?.order || 99;
            return orderA - orderB;
        });
    } else if (selectId === 'selFloor') {
        uniqueVals.sort((a, b) => getFloorWeight(a) - getFloorWeight(b));
    } else {
        uniqueVals.sort();
    }
    
    sel.innerHTML = `<option value="">${defaultText}</option>` + 
        uniqueVals.map(v => {
            let displayValue = selectId === 'selHall' ? (CONFIG.HALL_MAP[v]?.name || v) : v;
            return `<option value="${escHtml(v)}">${escHtml(displayValue)}</option>`;
        }).join('');
    
    if (uniqueVals.includes(currentVal)) sel.value = currentVal;
}

function updateFilters(e) {
    let h = getEle('selHall').value;
    let f = getEle('selFloor').value;
    let l = getEle('selLoc').value;
    let k = getEle('selKeyword').value.trim().toUpperCase(); 
    
    const triggerId = e ? e.target.id : null;

    if (triggerId === 'selHall') {
        const validF = uniqueBoxes.filter(d => d.hall === h).map(d => d._floor);
        if (f && !validF.includes(f)) { f = ''; getEle('selFloor').value = ''; }
        const validL = uniqueBoxes.filter(d => d.hall === h && (!f || d._floor === f)).map(d => d._exactLoc);
        if (l && !validL.includes(l)) { l = ''; getEle('selLoc').value = ''; }
    } 
    else if (triggerId === 'selFloor') {
        const validH = uniqueBoxes.filter(d => d._floor === f).map(d => d.hall);
        if (h && !validH.includes(h)) { h = ''; getEle('selHall').value = ''; }
        const validL = uniqueBoxes.filter(d => d._floor === f && (!h || d.hall === h)).map(d => d._exactLoc);
        if (l && !validL.includes(l)) { l = ''; getEle('selLoc').value = ''; }
    } 
    else if (triggerId === 'selLoc') {
        const validH = uniqueBoxes.filter(d => d._exactLoc === l).map(d => d.hall);
        if (h && !validH.includes(h)) { h = ''; getEle('selHall').value = ''; }
        const validF = uniqueBoxes.filter(d => d._exactLoc === l && (!h || d.hall === h)).map(d => d._floor);
        if (f && !validF.includes(f)) { f = ''; getEle('selFloor').value = ''; }
    }

    getEle('suggestions').style.display = 'none';

    let filteredBoxes = uniqueBoxes.filter(d => {
        if (h && d.hall !== h) return false;
        if (f && d._floor !== f) return false;
        if (l && d._exactLoc !== l) return false;
        
        if (k) {
            const tokens = k.replace(/[\n\r\t\/、，,\-]/g, ' ').replace(/\s+/g, ' ').split(' ').filter(Boolean);
            if (!tokens.every(t => d._searchIndex.includes(t))) return false;
        }
        
        return true;
    });

    if (!h) updateDropdownOptions('selHall', filteredBoxes.map(d => d.hall));
    if (!f) updateDropdownOptions('selFloor', filteredBoxes.map(d => d._floor));
    if (!l) updateDropdownOptions('selLoc', filteredBoxes.map(d => d._exactLoc));

    const chipBox = getEle('filterIdChips');
    if (filteredBoxes.length === 0) {
        chipBox.innerHTML = '<div class="chip-empty-msg">⚠️ 無符合條件的迴路盒</div>';
    } else if (!h && !f && !l && !k) {
        chipBox.innerHTML = ''; 
    } else {
        chipBox.innerHTML = filteredBoxes
            .sort((a,b) => a.id.localeCompare(b.id))
            .map((d, i) => `<div class="id-chip" data-id="${escHtml(d.id)}" style="animation-delay:${i*0.02}s">${escHtml(d.id)}</div>`)
            .join('');
    }
}

function resetFilters() {
    ['selHall', 'selFloor', 'selLoc', 'selKeyword'].forEach(id => getEle(id).value = '');
    populateInitialFilters(); 
    getEle('filterIdChips').innerHTML = ''; 
}

function triggerSearch(id) {
    getEle('searchInput').value = id;
    getEle('suggestions').style.display = 'none';
    renderResult(id);
}

function handleMainInput() {
    const raw = getEle('searchInput').value;
    const val = normalizeSearchInput(raw);

    if (!val) return getEle('suggestions').style.display = 'none';
    
    if (isIdLike(val)) {
        const searchRegex = new RegExp(escapeRegExp(val).replace(/\s+/g, '\\s*'), 'i');
        const sugs = uniqueBoxes.filter(d => searchRegex.test(d.id)).slice(0, CONFIG.MAX_SUGGESTIONS);
        if(!sugs.length) { getEle('suggestions').style.display = 'none'; return; }
        
        getEle('suggestions').innerHTML = sugs.map(d => {
            const hallInfo = CONFIG.HALL_MAP[d.hall] || { short: d.hall||'?', color: '#8E8E93' };
            const matches = db.filter(m => m.id === d.id);
            const uniqueLocs = [...new Set(matches.map(m => m.loc?.trim()).filter(Boolean))].join(' / ') || '未標示位置';
            
            return `<div class="sug-item" data-id="${escHtml(d.id)}">
                <div class="sug-header"><span style="font-weight:600; color:var(--text-main);">${escHtml(d.id)}</span><span class="sug-hall" style="background:${hallInfo.color}25; color:${hallInfo.color}">${escHtml(hallInfo.short)}</span></div>
                <div class="sug-loc">📍 ${escHtml(uniqueLocs)}</div>
            </div>`;
        }).join('');
        getEle('suggestions').style.display = 'block';
        return;
    }

    const sugs = fuzzyMatchIds(raw).slice(0, CONFIG.MAX_SUGGESTIONS);
    if(!sugs.length) { getEle('suggestions').style.display = 'none'; return; }
    
    getEle('suggestions').innerHTML = sugs.map(d => {
        const hallInfo = CONFIG.HALL_MAP[d.hall] || { short: d.hall||'?', color: '#8E8E93' };
        const matches = db.filter(m => m.id === d.id);
        const uniqueLocs = [...new Set(matches.map(m => m.loc?.trim()).filter(Boolean))].join(' / ') || '未標示位置';

        return `<div class="sug-item" data-id="${escHtml(d.id)}">
            <div class="sug-header"><span style="font-weight:600; color:var(--text-main);">${escHtml(d.id)}</span><span class="sug-hall" style="background:${hallInfo.color}25; color:${hallInfo.color}">${escHtml(hallInfo.short)}</span></div>
            <div class="sug-loc">📍 ${escHtml(uniqueLocs)}</div>
        </div>`;
    }).join('');
    getEle('suggestions').style.display = 'block';
}

function renderResult(id) {
    if (!id) return;
    const matches = db.filter(d => d.id === id);
    if (!matches.length) return showPlaceholder('查無此編號');
    
    currentId = id; 
    const first = matches[0];
    const hallInfo = CONFIG.HALL_MAP[first.hall] || { name: first.hall || '—', short: '?', color: '#8E8E93' };

    const uniqueLocs = [...new Set(matches.map(d => d.loc?.trim()).filter(Boolean))].join(' / ') || '—';

    const groups = new Map();
    matches.forEach(d => {
        const sys = (d.sys && (aliases[d.sys] || d.sys)) || '未命名系統';
        const destInfo = [d.dest?.trim(), d.room?.trim()].filter(Boolean).join(' ') || '未標示目的地';
        const key = `${sys}§${d.conn||'—'}§${destInfo}`;
        if (!groups.has(key)) groups.set(key, { sys, conn: d.conn||'—', destInfo, qty: 0 });
        groups.get(key).qty += parseInt(d.qty, 10) || 0;
    });

    const rows = [...groups.values()].sort((a,b) => a.sys.localeCompare(b.sys,'zh-TW')).map(g => 
        `<tr><td><div class="sys-name">${escHtml(g.sys)}</div><div class="dest-info"><span class="dest-icon">↳</span> <span>${escHtml(g.destInfo)}</span></div></td>
        <td>${escHtml(g.conn)}</td><td>${g.qty||'0'}</td></tr>` 
    ).join('');

    getEle('resultArea').innerHTML = `
        <div class="card">
            <div class="tag">SYSTEM SCAN OK</div>
            <div class="id-label">${escHtml(first.id)}</div><hr class="divider">
            <div class="info-grid">
                <div class="info-item"><div class="label">廳別</div><div class="value"><span class="hall-badge" style="background:${hallInfo.color}25;color:${hallInfo.color}">${escHtml(hallInfo.short)}</span><span style="font-size:16px;font-weight:500; color:var(--text-main);">${escHtml(hallInfo.name)}</span></div></div>
                <div class="info-item"><div class="label">位置</div><div class="value" style="font-size:16px; word-break:break-word; color:var(--text-main);">${escHtml(uniqueLocs)}</div></div>
            </div>
        </div>
        <div class="card"><p class="section-title">接口清單 / INTERFACE LIST</p>
        <table><thead><tr><th>系統 / 目的地</th><th>接頭</th><th>數量</th></tr></thead><tbody>${rows}</tbody></table></div>`;
        
    getEle('resultArea').style.display = 'block'; getEle('placeholder').style.display = 'none';
}

function showPlaceholder(msg) { currentId = null; getEle('resultArea').style.display = 'none'; getEle('placeholder').style.display = 'block'; getEle('placeholder').innerText = msg; }

function buildAliasEditor() {
    const sysNames = [...new Set(db.map(d => d.sys).filter(Boolean))].sort();
    getEle('aliasList').innerHTML = sysNames.map(s => `
        <div class="alias-row">
            <span class="alias-orig">${escHtml(s)}</span>
            <input class="alias-input" data-orig="${encodeURIComponent(s)}" value="${escHtml(aliases[s]||'')}" placeholder="自訂">
        </div>`).join('');
}

function saveAliases() {
    const btn = getEle('saveBtn');
    document.querySelectorAll('.alias-input').forEach(el => { 
        const v = el.value.trim(); 
        const orig = decodeURIComponent(el.dataset.orig); 
        if(v) aliases[orig] = v; else delete aliases[orig]; 
    });
    
    try {
        localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(aliases));
        buildSearchIndex();
        btn.innerText = '✅ 已儲存'; 
        btn.style.background = 'var(--green)';
        setTimeout(() => { btn.innerText = '儲存'; btn.style.background = 'var(--blue)'; getEle('settingsArea').style.display = 'none'; }, 800);
        if(currentId) renderResult(currentId); 
    } catch(e) { alert('儲存失敗：請確認是否開啟了無痕模式，或裝置儲存空間已滿。'); }
}
</script>
