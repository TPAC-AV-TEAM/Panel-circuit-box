<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AV系統-A館</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-title" content="AV系統-A館">
    <meta name="application-name" content="AV系統-A館">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #000000;
            --card-bg: rgba(30, 30, 32, 0.6);
            --text-main: #F5F5F7;
            --text-secondary: #8E8E93;
            --accent-blue: #0A84FF;
            --border-color: rgba(255, 255, 255, 0.12);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "SF Pro Display", "-apple-system", "Inter", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 600px; padding-top: 2.5rem; }

        .main-title {
            font-weight: 700;
            background: linear-gradient(180deg, #FFFFFF 0%, #8E8E93 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            text-align: center;
            margin-bottom: 15px;
        }

        .macos-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 12px;
        }

        .search-container { display: flex; gap: 8px; align-items: center; margin-top: 10px; margin-bottom: 20px; }

        input[type="text"], select {
            flex: 1;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 15px;
            color: #FFFFFF;
            font-size: 16px;
            outline: none;
        }

        select option { background-color: #1c1c1e; color: #fff; }

        .icon-btn {
            width: 42px; height: 42px;
            background-color: rgba(255, 255, 255, 0.08);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #FFFFFF;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .metric-label { color: var(--accent-blue); font-size: 11px; font-weight: 700; margin-bottom: 4px; }
        .id-title { font-size: 26px; margin: 0; color: #FFFFFF; }
        .divider { border: 0.5px solid rgba(255,255,255,0.1); margin: 15px 0; }
        
        .info-row { margin-bottom: 15px; }
        .info-label { color: var(--text-secondary); font-size: 14px; margin-bottom: 4px; }
        .info-value { font-size: 22px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--text-secondary); padding: 8px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        td { padding: 12px 8px; border-bottom: 0.5px solid rgba(255, 255, 255, 0.05); font-size: 15px; }

        .status-text { text-align: center; color: #48484A; font-size: 12px; letter-spacing: 1px; margin-top: 15px; }
        .footer-text { text-align: center; font-size: 10px; color: #3A3A3C; margin-top: 30px; letter-spacing: 2px; }

        .alias-input { padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.05); color: white; width: 100%; box-sizing: border-box; font-size: 14px;}
        .alias-btn { background: var(--accent-blue); color: white; border: none; border-radius: 8px; padding: 0 15px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">音視訊迴路盒</h1>

    <div class="macos-card search-container">
        <input type="text" id="searchInput" placeholder="輸入編號 (例如: 07-02)" autocomplete="off" oninput="handleSearch()">
        <button class="icon-btn" onclick="clearSearch()">✕</button>
        <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="settingsArea" class="macos-card" style="display: none; margin-top:-10px;">
        <p class="info-label" style="color: var(--accent-blue); font-weight: 600;">🛠️ 自訂系統名稱 (馬甲系統)</p>
        <div style="display: flex; gap: 8px; margin-bottom: 15px;">
            <select id="origSys" class="alias-input" style="flex: 1;">
                <option value="">正在掃描系統清單...</option>
            </select>
            <input type="text" id="newSys" class="alias-input" style="flex: 1;" placeholder="新名稱 (例: Video)">
            <button class="alias-btn" onclick="addAlias()">新增</button>
        </div>
        <div id="aliasList"></div>
    </div>

    <div id="resultArea" style="display: none;">
        <div class="macos-card" style="margin-top:-10px;">
            <p class="metric-label">SYSTEM SCAN OK</p>
            <h2 id="resID" class="id-title"></h2>
            <div class="divider"></div>
            
            <div class="info-row">
                <div class="info-label">廳別</div>
                <div id="resHall" class="info-value"></div>
            </div>
            <div class="info-row">
                <div class="info-label">詳細位置</div>
                <div id="resLoc" class="info-value"></div>
            </div>
        </div>

        <div class="macos-card">
            <p class="info-label">📦 接口清單</p>
            <table id="interfaceTable">
                <thead>
                    <tr><th>系統</th><th>接頭</th><th>數量</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <p id="placeholderText" class="status-text">READY TO SCAN</p>
    <p class="footer-text">OS 26 TERMINAL</p>
</div>

<script>
    let dbData = [];
    let systemAliases = JSON.parse(localStorage.getItem('avSystemAliases')) || {};

    async function loadData() {
        try {
            const response = await fetch('./data.json?v=' + new Date().getTime()); 
            dbData = await response.json();
            
            renderAliases();         
            populateSystemDropdown(); 
        } catch (e) {
            console.error("資料讀取失敗:", e);
            document.getElementById('placeholderText').innerText = "系統故障: 無法連線至資料庫";
        }
    }

    function populateSystemDropdown() {
        const sysSet = new Set(); 
        
        dbData.forEach(item => {
            let sys = String(item['系統'] || '').trim();
            if (sys) sysSet.add(sys);
        });

        const select = document.getElementById('origSys');
        select.innerHTML = '<option value="">請選擇原名稱...</option>';
        
        Array.from(sysSet).sort().forEach(sys => {
            select.innerHTML += `<option value="${sys}">${sys}</option>`;
        });
    }

    function formatID(id) {
        if (!id) return "";
        let clean = String(id).toUpperCase().replace(/[\s-]/g, '');
        return clean.startsWith("AV") ? clean : "AV" + clean;
    }

    function handleSearch() {
        const inputVal = document.getElementById('searchInput').value.trim();
        if (!inputVal) {
            hideResult();
            return;
        }

        const query = formatID(inputVal);
        const matches = dbData.filter(item => formatID(item['迴路盒編號']) === query);

        if (matches.length > 0) {
            showResult(matches, query);
        } else {
            hideResult();
            document.getElementById('placeholderText').innerText = "查無此編號";
        }
    }

    function showResult(matches, query) {
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('placeholderText').style.display = 'none';
        
        const first = matches[0];
        document.getElementById('resID').innerText = first['迴路盒編號'] || query;
        
        let hall = String(first['廳別'] || 'N/A').split('\n')[0].trim();
        if (hall.includes("大劇院")) hall = "GT";
        else if (hall.includes("多形式")) hall = "BB";
        else if (hall.includes("鏡框式")) hall = "GP";
        document.getElementById('resHall').innerText = hall;
        
        let loc = String(first['迴路盒位置'] || 'N/A').replace(/\n/g, ' ');
        document.getElementById('resLoc').innerText = loc;

        const summaryMap = {};
        matches.forEach(item => {
            let sys = String(item['系統'] || '').trim();
            let conn = String(item['接頭'] || '').trim();

            // 1. 套用馬甲系統設定
            if (systemAliases[sys]) {
                sys = systemAliases[sys];
            }

            // (已移除「連接線 ➔ T/L」的強制轉譯，保留原始文字)

            // 2. 使用系統+接頭作為合併依據
            const key = `${sys}|${conn}`; 
            const count = parseInt(item['接頭數'], 10) || 0;
            
            if (!summaryMap[key]) {
                summaryMap[key] = { sys: sys, conn: conn, count: 0 };
            }
            summaryMap[key].count += count;
        });

        const tbody = document.querySelector('#interfaceTable tbody');
        tbody.innerHTML = '';
        Object.values(summaryMap).forEach(group => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${group.sys}</td>
                <td>${group.conn}</td>
                <td>${group.count}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function hideResult() {
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('placeholderText').style.display = 'block';
        document.getElementById('placeholderText').innerText = "READY TO SCAN";
    }

    function clearSearch() {
        document.getElementById('searchInput').value = '';
        hideResult();
    }

    function toggleSettings() {
        const panel = document.getElementById('settingsArea');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function addAlias() {
        const orig = document.getElementById('origSys').value.trim(); 
        const alias = document.getElementById('newSys').value.trim();
        
        if (orig && alias) {
            systemAliases[orig] = alias; 
            localStorage.setItem('avSystemAliases', JSON.stringify(systemAliases)); 
            
            document.getElementById('origSys').value = '';
            document.getElementById('newSys').value = '';
            
            renderAliases(); 
            if (document.getElementById('searchInput').value) {
                handleSearch();
            }
        }
    }

    function removeAlias(orig) {
        delete systemAliases[orig];
        localStorage.setItem('avSystemAliases', JSON.stringify(systemAliases));
        renderAliases();
        if (document.getElementById('searchInput').value) {
            handleSearch();
        }
    }

    function renderAliases() {
        const list = document.getElementById('aliasList');
        list.innerHTML = '';
        for (let orig in systemAliases) {
            list.innerHTML += `
                <div style="display:flex; justify-content:space-between; font-size:14px; margin-bottom:8px; border-bottom:0.5px solid rgba(255,255,255,0.1); padding-bottom:8px; color: var(--text-secondary);">
                    <span>${orig} ➔ <span style="color:var(--text-main); font-weight:600;">${systemAliases[orig]}</span></span>
                    <span style="color:#FF453A; cursor:pointer;" onclick="removeAlias('${orig}')">刪除</span>
                </div>
            `;
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
