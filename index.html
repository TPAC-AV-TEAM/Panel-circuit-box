<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AV 迴路盒查詢 | V12.1</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg:          #000000;
            --card:        #151517;
            --card-border: rgba(255,255,255,0.12);
            --blue:        #0A84FF;
            --blue-glow:   rgba(10, 132, 255, 0.25);
            --green:       #32D74B;
            --text-main:   #FFFFFF;
            --text-sub:    #A1A1A8;
            --text-mute:   #C7C7CC;
            --border:      rgba(255,255,255,0.18);
            --sep:         rgba(255,255,255,0.08);
            --input-bg:    rgba(255,255,255,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg); color: var(--text-main);
            font-family: "SF Pro Display","Inter","-apple-system",sans-serif;
            min-height: 100vh; padding-bottom: calc(60px + env(safe-area-inset-bottom,0px));
            display: flex; flex-direction: column; align-items: center;
        }

        .header {
            width: 100%; padding: 60px 16px 20px; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; text-align: center;
        }
        .header h1 { font-size: 28px; font-weight: 700; color: #fff; margin-bottom: 4px; letter-spacing: 0.02em; }
        .version-label { font-size: 11px; font-weight: 700; color: var(--blue); letter-spacing: 0.15em; margin-bottom: 24px; opacity: 0.9; }

        .search-group { display: flex; flex-direction: column; gap: 12px; max-width: 540px; margin: 0 auto; }
        .search-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        .search-wrap { position: relative; flex: 1; }
        .search-wrap input {
            width: 100%; background: var(--input-bg); border: 1.5px solid transparent;
            border-radius: 16px; padding: 16px 18px; color: var(--text-main); font-size: 16px;
            outline: none; transition: all 0.25s cubic-bezier(0.2,0,0,1);
            box-shadow: inset 0 0 0 0.5px var(--border);
        }
        .search-wrap input:focus { background: rgba(255,255,255,0.16); border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-glow); }
        .search-wrap input::placeholder { color: rgba(255,255,255,0.45); }
        .search-wrap input[type="search"]::-webkit-search-cancel-button { -webkit-appearance: none; display: none; }

        .icon-btn {
            width: 52px; height: 52px; background: var(--input-bg);
            border: 0.5px solid var(--border); border-radius: 16px;
            color: var(--text-sub); cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s;
        }
        @media (hover: hover) {
            .icon-btn:hover { border-color: var(--text-sub); color: var(--text-main); background: rgba(255,255,255,0.15); }
            .sug-item:hover, .list-card:hover { background: rgba(255,255,255,0.08); }
        }
        .icon-btn:active { background: rgba(255,255,255,0.25); transform: scale(0.94); }

        .suggestions {
            position: absolute; top: calc(100% + 8px); left: 0; right: 0;
            background: rgba(28,28,30,0.98); border: 1px solid var(--card-border);
            border-radius: 16px; overflow-y: auto; max-height: 45vh;
            box-shadow: 0 12px 48px rgba(0,0,0,0.8); z-index: 200; display: none;
        }
        .sug-item { padding: 14px 16px; cursor: pointer; border-bottom: 0.5px solid var(--sep); display: flex; flex-direction: column; gap: 6px; }
        .sug-header { display: flex; justify-content: space-between; align-items: center; font-size: 16px; }
        .sug-hall { font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 8px; }
        .sug-loc { font-size: 13px; color: var(--text-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .content { width: 100%; max-width: 540px; padding: 24px 16px 0; }
        .card {
            background: var(--card); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 24px; margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .tag { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; color: var(--blue); margin-bottom: 10px; }
        .id-label { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .divider { border: none; border-top: 1px solid var(--sep); margin: 18px 0; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .info-item .label { font-size: 13px; color: var(--text-sub); margin-bottom: 6px; font-weight: 500; }
        .info-item .value { font-size: 17px; font-weight: 600; line-height: 1.4; }
        .hall-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 999px; font-size: 16px; font-weight: 700; margin-right: 8px; }

        .list-results-container { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; border-top: 1px solid var(--sep); padding-top: 16px; }
        .list-card {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 14px; padding: 14px; cursor: pointer; transition: all 0.2s;
            animation: fadeInScale 0.2s ease-out forwards; opacity: 0; transform: scale(0.98);
        }
        .list-card:active { transform: scale(0.96); background: rgba(255,255,255,0.1); border-color: var(--blue); }
        @keyframes fadeInScale { to { opacity: 1; transform: scale(1); } }
        .list-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .list-card-id { font-size: 18px; font-weight: 600; }
        .list-card-loc { font-size: 13px; color: var(--text-mute); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .section-title { font-size: 12px; color: var(--text-sub); font-weight: 700; letter-spacing: 0.12em; margin-bottom: 12px; }

        /* 表格：四欄 系統/目的地 | 機櫃/設備 | 接頭 | 數量 */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th {
            text-align: left; font-size: 12px; color: var(--text-sub);
            font-weight: 600; padding: 0 4px 10px; border-bottom: 1px solid var(--border);
        }
        thead th:nth-child(1) { width: 36%; }
        thead th:nth-child(2) { width: 30%; }
        thead th:nth-child(3) { width: 20%; }
        thead th:nth-child(4) { width: 14%; text-align: right; }
        tbody tr.data-row { border-bottom: 1px solid var(--sep); }
        tbody td { padding: 12px 4px; font-size: 15px; font-weight: 500; vertical-align: top; word-wrap: break-word; }
        tbody td:nth-child(2) { color: var(--text-sub); font-size: 13px; font-weight: 400; }
        tbody td:nth-child(3) { color: var(--text-mute); font-size: 13px; font-weight: 400; }
        tbody td:last-child { text-align: right; font-size: 18px; font-weight: 700; }
        .sys-name { font-weight: 600; line-height: 1.4; }
        .dest-info { font-size: 12px; color: var(--text-mute); margin-top: 5px; line-height: 1.4; display: flex; gap: 4px; }
        .dest-icon { color: var(--blue); flex-shrink: 0; font-weight: bold; opacity: 0.6; }
        .rack-info { font-size: 12px; line-height: 1.5; word-break: break-all; }
        .dev-info { font-size: 11px; color: var(--text-mute); margin-top: 3px; }

        .placeholder-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 16px; animation: fadeIn 0.4s ease-out; width: 100%; max-width: 540px; margin: 0 auto; }
        .ph-icon { font-size: 42px; margin-bottom: 16px; opacity: 0.9; }
        .ph-title { font-size: 20px; font-weight: 700; color: var(--text-main); margin-bottom: 24px; letter-spacing: 0.05em; }
        .ph-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; padding: 20px; width: 100%; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02); }
        .ph-rule { font-size: 14px; font-weight: 600; color: var(--blue); margin-bottom: 14px; }
        .ph-item { font-size: 14px; color: var(--text-main); margin-bottom: 10px; line-height: 1.6; display: flex; }
        .ph-item span { color: var(--text-sub); display: inline-block; width: 85px; flex-shrink: 0; font-weight: 500; }
        .ph-hint { margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--sep); font-size: 13px; color: var(--text-mute); line-height: 1.5; }

        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .save-btn { background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .close-settings { background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 10px; width: 34px; height: 34px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .alias-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--sep); }
        .alias-orig { font-size: 14px; color: var(--text-mute); flex: 1; word-break: break-all; min-width: 0; line-height: 1.3; }
        .alias-row input { flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--input-bg); color: #fff; outline: none; font-size: 15px; min-width: 0; transition: border-color 0.2s; }
        .alias-row input:focus { border-color: var(--blue); }
    </style>
</head>

let db = [], uniqueBoxes = [], aliases = {}, currentId = null;
let idSearchIndex = new Map();

const escHtml = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const safeParse = (str, fb) => { try { return JSON.parse(str) || fb; } catch { return fb; } };
const getEle = id => document.getElementById(id);
const normStr = s => String(s ?? '').toUpperCase().replace(/[^A-Z0-9\u4E00-\u9FFF]/g, '');
const tokenize = q => String(q ?? '').split(/[\s,，、;:\/\\|]+/).map(normStr).filter(Boolean);

window.addEventListener('DOMContentLoaded', () => {
    const saved = safeParse(localStorage.getItem(CONFIG.STORAGE_KEY), {});
    aliases = { ...DEFAULT_ALIASES, ...saved };
    initDb();
    showPlaceholder();
    bindEvents();
});

function getSysCategory(sysName) {
    const s = String(sysName).toUpperCase();
    if (s.includes('POWER') || s.includes('電源') || s.includes('KW')) return { type: 'POWER', color: '#FF453A', order: 10 };
    if (s.includes('光纖'))                                             return { type: 'FIBER', color: '#0A84FF', order: 20 };
    if (s.includes('揚聲'))                                             return { type: 'AUDIO', color: '#32D74B', order: 35 };
    if (s.includes('音頻') || s.includes('麥克風') || s.includes('廣播')) return { type: 'AUDIO', color: '#32D74B', order: 30 };
    if (s.includes('視訊'))                                             return { type: 'VIDEO', color: '#FF9F0A', order: 40 };
    if (s.includes('網路') || s.includes('對講') || s.includes('RJ'))   return { type: 'NETWORK', color: '#BF5AF2', order: 50 };
    return { type: 'OTHER', color: '#8E8E93', order: 99 };
}

function normalizeId(raw) {
    let v = raw.trim().toUpperCase();
    if (!v) return v;
    if (/^\d{4}$/.test(v)) return `AV ${v.slice(0,2)}-${v.slice(2)}`;
    if (/^\d{2}-\d{2}/.test(v)) return `AV ${v}`;
    v = v.replace(/^AV\s*/, 'AV ');
    return v;
}

function buildSearchIndex() {
    const map = new Map();
    db.forEach(d => {
        if (!d.id) return;
        const h = CONFIG.HALL_MAP[d.hall] || {};
        const norm = normStr([
            d.id,
            d.hall || '', h.name || '', h.short || '',   // 廳別本身也納入索引
            d.sys || '', aliases[d.sys] || '',
            d.dest || '', d.room || '', d.rack || '', d.dev || '',
            d.conn || '', d.loc || ''
        ].join(' '));
        map.set(d.id, (map.get(d.id) || '') + norm);
    });
    idSearchIndex = map;
}

function fuzzyMatchIds(query) {
    const tokens = tokenize(query);
    if (!tokens.length) return [];
    return uniqueBoxes.filter(d => {
        const idx = idSearchIndex.get(d.id) || '';
        return tokens.every(t => {
            if (HALL_TOKENS.has(t)) return d.hall.includes(HALL_TOKENS.get(t));
            if (FLOOR_RE.test(t)) {
                const f = normStr(d._floor);
                return f === t || f === t + 'F';
            }
            return idx.includes(t);
        });
    });
}

function triggerSearch(id) {
    getEle('searchInput').value = id;
    getEle('suggestions').style.display = 'none';
    renderResult(id);
}

function bindEvents() {
    const input = getEle('searchInput');

    input.addEventListener('input', () => {
        const raw = input.value;
        if (!raw.trim()) { getEle('suggestions').style.display = 'none'; return; }
        let sugs = fuzzyMatchIds(raw);
        const cleanRaw = raw.replace(/[^A-Z0-9]/ig, '').toUpperCase();
        sugs.sort((a, b) => {
            const aHit = a.id.replace(/[^A-Z0-9]/g,'').includes(cleanRaw);
            const bHit = b.id.replace(/[^A-Z0-9]/g,'').includes(cleanRaw);
            if (aHit && !bHit) return -1;
            if (!aHit && bHit) return 1;
            return a.id.localeCompare(b.id);
        });
        sugs = sugs.slice(0, CONFIG.MAX_SUGGESTIONS);
        if (!sugs.length) { getEle('suggestions').style.display = 'none'; return; }
        getEle('suggestions').innerHTML = sugs.map(d => {
            const h = CONFIG.HALL_MAP[d.hall] || { short: d.hall||'?', color: '#8E8E93' };
            const loc = [...new Set(db.filter(m => m.id===d.id).map(m => m.loc?.trim()).filter(Boolean))].join(' / ') || '未標示位置';
            return `<div class="sug-item" data-id="${escHtml(d.id)}">
                <div class="sug-header">
                    <span style="font-weight:600">${escHtml(d.id)}</span>
                    <span class="sug-hall" style="background:${h.color}25;color:${h.color}">${escHtml(h.short)}</span>
                </div>
                <div class="sug-loc">📍 ${escHtml(loc)}</div>
            </div>`;
        }).join('');
        getEle('suggestions').style.display = 'block';
    });

    input.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        e.preventDefault();
        input.blur();
        const raw = input.value.trim();
        if (!raw) return;
        getEle('suggestions').style.display = 'none';
        const norm = normalizeId(raw);
        const exact = uniqueBoxes.find(d => d.id === norm || d.id === raw.toUpperCase());
        if (exact) return triggerSearch(exact.id);
        const results = fuzzyMatchIds(raw);
        if (results.length === 1) return triggerSearch(results[0].id);
        renderListResults(results, raw);
    });

    getEle('clearBtn').addEventListener('click', () => {
        input.value = '';
        getEle('suggestions').style.display = 'none';
        showPlaceholder();
    });

    getEle('settingBtn').addEventListener('click', () => {
        const s = getEle('settingsArea');
        s.style.display = s.style.display === 'none' ? 'block' : 'none';
    });
    getEle('closeSettingBtn').addEventListener('click', () => getEle('settingsArea').style.display = 'none');
    getEle('saveBtn').addEventListener('click', saveAliases);

    document.addEventListener('click', e => {
        const sug = e.target.closest('.sug-item');
        if (sug?.dataset.id) return triggerSearch(sug.dataset.id);
        const card = e.target.closest('.list-card');
        if (card?.dataset.id) return triggerSearch(card.dataset.id);
        if (!e.target.closest('.search-wrap')) getEle('suggestions').style.display = 'none';
    });
}

function normalizeHall(raw) {
    let h = (raw || '').split('\n')[0].trim();
    if (h.includes('大劇院'))                         return '大劇院';
    if (h.includes('多形式'))                         return '多形式中劇院';
    if (h.includes('鏡框式'))                         return '鏡框式中劇院';
    if (h.includes('偶劇院'))                         return '偶劇院';
    if (h.includes('屋頂'))                           return '屋頂劇場';
    if (h.includes('排練'))                           return '排練室';
    if (h.includes('公共'))                           return '公共區域';
    if (h.includes('卸貨') || h.includes('外部'))     return '卸貨口與外部空間';
    return h;
}

function initDb() {
    db = RAW_DB.map(d => {
        const stdId  = (d.id  || '').trim().toUpperCase().replace(/^AV\s*/, 'AV ');
        const stdSys = (d.sys || '').split('\n')[0].trim();   // 清掉 sys 內的換行（如 POWER 多行說明）
        const stdHall = normalizeHall(d.hall);
        let floor = '', exactLoc = (d.loc || '').split('\n')[0].trim();
        const floorMatch = exactLoc.match(/(?:^|[^a-zA-Z0-9])([B]?\d{1,2}[M]?F|RF)(?![a-zA-Z0-9])/i);
        if (floorMatch) {
            floor = floorMatch[1].toUpperCase();
            exactLoc = exactLoc.replace(new RegExp(floorMatch[1].replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i'), '').replace(/^[-\s]+/, '').trim();
        } else {
            const roomMatch = exactLoc.match(/^0?(\d{1,2})\.\d{2}/);
            if (roomMatch) floor = roomMatch[1] + 'F';
            else {
                const idMatch = stdId.match(/^AV\s*(\d{1,2})([M]?)/i);
                if (idMatch) floor = idMatch[1] + (idMatch[2].toUpperCase() === 'M' ? 'MF' : 'F');
            }
        }
        if (floor) floor = floor.replace(/^(B?)0+(\d+.*)/, '$1$2');
        return { ...d, id: stdId, hall: stdHall, sys: stdSys, _floor: floor || '未知樓層', _exactLoc: exactLoc || '一般區域' };
    });

    const seenIds = new Set();
    uniqueBoxes = db.filter(d => {
        if (!d.id || seenIds.has(d.id)) return false;
        seenIds.add(d.id); return true;
    });

    buildAliasEditor();
    buildSearchIndex();
}

function renderListResults(list, query) {
    currentId = null;
    if (!list.length) {
        getEle('resultArea').style.display = 'none';
        getEle('placeholderContainer').style.display = 'block';
        getEle('placeholderContainer').innerHTML = `<div class="placeholder-wrap"><div class="ph-icon">👻</div><div class="ph-title">查無相符資料</div><div class="ph-hint">找不到符合「${escHtml(query)}」的迴路盒，請嘗試更換關鍵字。</div></div>`;
        return;
    }
    const sorted = list.slice().sort((a, b) => a.id.localeCompare(b.id));
    const itemsHtml = sorted.map((d, i) => {
        const h = CONFIG.HALL_MAP[d.hall] || { short: d.hall||'?', color: '#8E8E93' };
        const loc = [...new Set(db.filter(m => m.id===d.id).map(m => m.loc?.trim()).filter(Boolean))].join(' / ') || '未標示位置';
        return `<div class="list-card" data-id="${escHtml(d.id)}" style="animation-delay:${i*0.02}s">
            <div class="list-card-header">
                <span class="list-card-id">${escHtml(d.id)}</span>
                <span class="sug-hall" style="background:${h.color}25;color:${h.color}">${escHtml(h.short)}</span>
            </div>
            <div class="list-card-loc">📍 ${escHtml(loc)}</div>
        </div>`;
    }).join('');
    getEle('resultArea').innerHTML = `
        <div class="card">
            <div class="tag">多筆相符結果</div>
            <div class="id-label" style="font-size:24px;">${escHtml(query)}</div>
            <div style="font-size:13px;color:var(--text-sub);margin-top:6px;">找到 ${list.length} 筆資料（點選進入詳情）</div>
            <div class="list-results-container">${itemsHtml}</div>
        </div>`;
    getEle('resultArea').style.display = 'block';
    getEle('placeholderContainer').style.display = 'none';
}

function renderResult(id) {
    if (!id) return;
    const matches = db.filter(d => d.id === id);
    if (!matches.length) return;
    currentId = id;
    const first = matches[0];
    const h = CONFIG.HALL_MAP[first.hall] || { name: first.hall||'—', short: '?', color: '#8E8E93' };
    const locs = [...new Set(matches.map(d => d.loc?.trim()).filter(Boolean))].join(' / ') || '—';

    // 分組：以 (sys, conn, dest, room) 為 key，qty 直接使用（已是接頭數）
    const groups = new Map();
    let totalQty = 0;
    matches.forEach(d => {
        const sys = (d.sys && (aliases[d.sys] || d.sys)) || '未命名系統';
        const dest = [d.dest?.trim(), d.room?.trim()].filter(Boolean).join(' ') || '未標示目的地';
        const key = `${sys}§${d.conn||'—'}§${dest}`;
        if (!groups.has(key)) {
            groups.set(key, { sys, conn: d.conn||'—', dest, qty: 0, rack: d.rack||'', dev: d.dev||'' });
        }
        const q = parseInt(d.qty, 10) || 0;
        groups.get(key).qty += q;
        totalQty += q;
    });

    const sortedGroups = [...groups.values()].sort((a,b) => {
        const catA = getSysCategory(a.sys);
        const catB = getSysCategory(b.sys);
        if (catA.order !== catB.order) return catA.order - catB.order;
        return a.sys.localeCompare(b.sys, 'zh-TW');
    });

    let lastSysType = null;
    let rowsHtml = '';
    sortedGroups.forEach(g => {
        const cat = getSysCategory(g.sys);
        if (lastSysType !== null && lastSysType !== cat.type) {
            rowsHtml += `<tr style="border:none;"><td colspan="4" style="height:14px;padding:0;"></td></tr>`;
        }
        const rackHtml = g.rack
            ? `<div class="rack-info">${escHtml(g.rack)}</div>${g.dev ? `<div class="dev-info">${escHtml(g.dev)}</div>` : ''}`
            : `<div style="color:var(--text-mute);font-size:12px;">—</div>`;
        rowsHtml += `<tr class="data-row">
            <td style="border-left:3px solid ${cat.color};padding-left:10px;border-radius:2px 0 0 2px;">
                <div class="sys-name" style="color:${cat.color}">${escHtml(g.sys)}</div>
                <div class="dest-info"><span class="dest-icon" style="color:${cat.color}">↳</span><span>${escHtml(g.dest)}</span></div>
            </td>
            <td>${rackHtml}</td>
            <td>${escHtml(g.conn)}</td>
            <td>${g.qty||'0'}</td>
        </tr>`;
        lastSysType = cat.type;
    });

    getEle('resultArea').innerHTML = `
        <div class="card">
            <div class="tag">SYSTEM SCAN OK</div>
            <div class="id-label">${escHtml(first.id)}</div>
            <div style="display:flex;gap:10px;margin-top:14px;">
                <div style="flex:1;background:rgba(50,215,75,0.08);padding:12px 14px;border-radius:12px;border:1px solid rgba(50,215,75,0.2);">
                    <div style="font-size:11px;color:var(--text-sub);margin-bottom:4px;letter-spacing:0.08em;">接頭總數</div>
                    <div style="font-size:24px;font-weight:700;color:#32D74B;">${totalQty}<span style="font-size:13px;color:var(--text-mute);font-weight:500;margin-left:4px;">個</span></div>
                </div>
                <div style="flex:1;background:rgba(255,255,255,0.04);padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);">
                    <div style="font-size:11px;color:var(--text-sub);margin-bottom:4px;letter-spacing:0.08em;">系統種類</div>
                    <div style="font-size:24px;font-weight:700;color:var(--text-main);">${groups.size}<span style="font-size:13px;color:var(--text-mute);font-weight:500;margin-left:4px;">項</span></div>
                </div>
            </div>
            <hr class="divider">
            <div class="info-grid">
                <div class="info-item">
                    <div class="label">廳別</div>
                    <div class="value">
                        <span class="hall-badge" style="background:${h.color}25;color:${h.color}">${escHtml(h.short)}</span>
                        <span style="font-size:16px;font-weight:500">${escHtml(h.name)}</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="label">位置</div>
                    <div class="value" style="font-size:16px;word-break:break-word">${escHtml(locs)}</div>
                </div>
            </div>
        </div>
        <div class="card">
            <p class="section-title">接口清單 / INTERFACE LIST</p>
            <table>
                <thead><tr>
                    <th>系統 / 目的地</th>
                    <th>機櫃 / 設備</th>
                    <th>接頭型式</th>
                    <th>接頭數</th>
                </tr></thead>
                <tbody>${rowsHtml}</tbody>
            </table>
        </div>`;
    getEle('resultArea').style.display = 'block';
    getEle('placeholderContainer').style.display = 'none';
}

function showPlaceholder() {
    currentId = null;
    getEle('resultArea').style.display = 'none';
    getEle('placeholderContainer').style.display = 'block';
    getEle('placeholderContainer').innerHTML = `
        <div class="placeholder-wrap">
            <div class="ph-icon">🔍</div>
            <div class="ph-title">開始查詢迴路盒</div>
            <div class="ph-card">
                <div class="ph-rule">💡 支援單一或多條件 (空白分隔)：</div>
                <div class="ph-item"><span>📌 編號</span> 04-01 或 12-05</div>
                <div class="ph-item"><span>🏛️ 空間</span> GT (大劇院)、4F、公共</div>
                <div class="ph-item"><span>🔌 設備</span> Twist、BNC、光纖</div>
                <div class="ph-hint">範例：「GT 4F」將為您列出大劇院 4 樓的迴路盒清單。</div>
            </div>
        </div>
    `;
}

function buildAliasEditor() {
    const names = [...new Set(db.map(d => d.sys).filter(Boolean))].sort();
    getEle('aliasList').innerHTML = names.map(s => `
        <div class="alias-row">
            <span class="alias-orig">${escHtml(s)}</span>
            <input class="alias-input" data-orig="${encodeURIComponent(s)}" value="${escHtml(aliases[s]||'')}" placeholder="自訂">
        </div>`).join('');
}

function saveAliases() {
    const btn = getEle('saveBtn');
    const userOverrides = {};
    document.querySelectorAll('.alias-input').forEach(el => {
        const v = el.value.trim();
        const orig = decodeURIComponent(el.dataset.orig);
        if (v) userOverrides[orig] = v;
    });
    try {
        localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(userOverrides));
        aliases = { ...DEFAULT_ALIASES, ...userOverrides };
        buildSearchIndex();
        btn.innerText = '✅ 已儲存';
        btn.style.background = 'var(--green)';
        setTimeout(() => { btn.innerText = '儲存'; btn.style.background = 'var(--blue)'; getEle('settingsArea').style.display = 'none'; }, 800);
        if (currentId) renderResult(currentId);
    } catch { alert('儲存失敗：請確認儲存空間。'); }
}
</script>
