<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AV 迴路盒查詢 | V11.5 Pure</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root {
            --bg: #000000; --card: #151517; --card-border: rgba(255,255,255,0.12);
            --blue: #0A84FF; --blue-glow: rgba(10, 132, 255, 0.25);
            --green: #32D74B; --text-main: #FFFFFF; --text-sub: #A1A1A8;
            --text-mute: #C7C7CC; --border: rgba(255,255,255,0.18);
            --sep: rgba(255,255,255,0.08); --input-bg: rgba(255,255,255,0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text-main); font-family: "SF Pro Display","Inter",sans-serif; min-height: 100vh; padding-bottom: 60px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; padding: 60px 16px 20px; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 100; text-align: center; }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
        .version-label { font-size: 11px; font-weight: 700; color: var(--blue); letter-spacing: 0.15em; margin-bottom: 24px; }
        .search-group { max-width: 540px; margin: 0 auto; width: 100%; }
        .search-row { display: flex; gap: 8px; }
        .search-wrap { position: relative; flex: 1; }
        .search-wrap input { width: 100%; background: var(--input-bg); border: 1.5px solid transparent; border-radius: 16px; padding: 16px; color: #fff; font-size: 16px; outline: none; }
        .search-wrap input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px var(--blue-glow); }
        .suggestions { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: #1c1c1e; border: 1px solid var(--card-border); border-radius: 16px; max-height: 45vh; overflow-y: auto; z-index: 200; display: none; }
        .sug-item { padding: 14px 16px; cursor: pointer; border-bottom: 0.5px solid var(--sep); }
        .sug-header { display: flex; justify-content: space-between; align-items: center; }
        .sug-hall { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
        .sug-loc { font-size: 13px; color: var(--text-mute); margin-top: 4px; }
        .icon-btn { width: 52px; height: 52px; background: var(--input-bg); border-radius: 16px; color: var(--text-sub); border: 0.5px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .content { width: 100%; max-width: 540px; padding: 24px 16px; }
        .card { background: var(--card); border: 1px solid var(--card-border); border-radius: 20px; padding: 24px; margin-bottom: 16px; }
        .tag { font-size: 11px; font-weight: 700; color: var(--blue); margin-bottom: 8px; }
        .id-label { font-size: 32px; font-weight: 700; }
        .stat-banner { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 14px; border-radius: 14px; text-align: center; border: 1px solid var(--sep); }
        .stat-box .label { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
        .stat-box .num { font-size: 24px; font-weight: 700; }
        .hall-badge { padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 14px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
        .info-item .label { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
        .info-item .value { font-size: 16px; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        thead th { text-align: left; font-size: 12px; color: var(--text-sub); padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        tbody td { padding: 12px 4px; border-bottom: 1px solid var(--sep); vertical-align: top; }
        .sys-name { font-weight: 600; font-size: 15px; }
        .dest-info { font-size: 12px; color: var(--text-mute); margin-top: 4px; }
        .qty-main { font-size: 18px; font-weight: 700; display: block; text-align: right; }
        .qty-sub { font-size: 11px; color: var(--text-mute); display: block; text-align: right; }
        .placeholder-wrap { text-align: center; padding: 40px 16px; }
        .ph-icon { font-size: 48px; margin-bottom: 16px; }
        .ph-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: left; }
    </style>
</head>
<body>
<div class="header">
    <h1>音視訊迴路盒</h1>
    <div class="version-label">V11.5 FIXED</div>
    <div class="search-group">
        <div class="search-row">
            <div class="search-wrap">
                <input type="search" id="searchInput" placeholder="搜尋 GT, BB, GP 或編號..." autocomplete="off">
                <div id="suggestions" class="suggestions"></div>
            </div>
            <button class="icon-btn" id="clearBtn">✕</button>
        </div>
    </div>
</div>
<div class="content">
    <div id="resultArea" style="display:none"></div>
    <div id="placeholderContainer"></div>
</div>
<script>
const CONFIG = {
    DATA_URL: './data.json',
    HALL_MAP: {
        '大劇院': { name: 'GT 大劇院', short: 'GT', color: '#FF3B30' },
        '多形式中劇院': { name: 'BB 藍盒子', short: 'BB', color: '#5AC8FA' },
        '鏡框式中劇院': { name: 'GP 球劇場', short: 'GP', color: '#34C759' },
        '偶劇院': { name: 'PT 偶劇院', short: 'PT', color: '#FF9F0A' },
        '排練室': { name: '排練室', short: '練', color: '#64D2FF' },
        '公共區域': { name: '公共區域', short: '公共', color: '#8E8E93' },
        '卸貨口與外部空間': { name: '外部空間', short: '外部', color: '#636366' },
    }
};
const HALL_TOKENS = new Map([
    ['GT', '大劇院'], ['大劇院', '大劇院'],
    ['BB', '多形式中劇院'], ['藍盒子', '多形式中劇院'],
    ['GP', '鏡框式中劇院'], ['球劇場', '鏡框式中劇院'],
    ['PT', '偶劇院'], ['偶劇院', '偶劇院'],
]);

let db = [], uniqueBoxes = [], idSearchIndex = new Map();

const escHtml = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const getEle = id => document.getElementById(id);
const normStr = s => String(s ?? '').toUpperCase().replace(/[^A-Z0-9一-鿿]/g, '');

async function loadData() {
    const raw = await fetch(CONFIG.DATA_URL).then(r => r.json());
    db = raw.map(d => {
        // 修正：使用正確的換行符號切割邏輯
        d.hall = (d.hall || '').split('\n')[0].split('\n')[0].trim(); 
        if (!d.hall) d.hall = (d.hall || '').split('\n')[0].trim();
        // 針對 JSON 中的真實換行字元做二次處理
        d.hall = d.hall.split('\n')[0].replace(/\n/g, '').split('\n')[0].trim();
        
        // 簡化處理：如果包含關鍵字就歸類
        if (d.hall.includes('大劇院')) d.hall = '大劇院';
        if (d.hall.includes('多形式')) d.hall = '多形式中劇院';
        if (d.hall.includes('鏡框式')) d.hall = '鏡框式中劇院';

        d.loc = (d.loc || '').split('\n')[0].trim();
        return { ...d, id: d.id.toUpperCase().replace(/^AV\s*/, 'AV ') };
    });
    
    const seen = new Set();
    uniqueBoxes = db.filter(d => seen.has(d.id) ? false : seen.add(d.id));
    
    uniqueBoxes.forEach(d => {
        const text = normStr(`${d.id} ${d.hall} ${d.loc} ${db.filter(m=>m.id===d.id).map(m=>m.sys).join(' ')}`);
        idSearchIndex.set(d.id, text);
    });
    showPlaceholder();
}

function fuzzyMatch(q) {
    const tokens = q.toUpperCase().split(/[\s,]+/).filter(Boolean).map(normStr);
    return uniqueBoxes.filter(d => tokens.every(t => {
        if (HALL_TOKENS.has(t)) return d.hall.includes(HALL_TOKENS.get(t));
        return idSearchIndex.get(d.id).includes(t);
    }));
}

function renderResult(id) {
    const matches = db.filter(d => d.id === id);
    const first = matches[0];
    const h = CONFIG.HALL_MAP[first.hall] || { name: first.hall, short: '?', color: '#8E8E93' };
    
    let tConn = 0, tCirc = 0;
    const groups = new Map();
    matches.forEach(d => {
        const key = `${d.sys}§${d.conn}§${d.dest}`;
        if (!groups.has(key)) groups.set(key, { ...d, c_qty: 0, s_qty: 0 });
        groups.get(key).c_qty += (parseInt(d.conn_qty) || 0);
        groups.get(key).s_qty += (parseInt(d.circuit_qty) || 0);
        tConn += (parseInt(d.conn_qty) || 0);
        tCirc += (parseInt(d.circuit_qty) || 0);
    });

    getEle('resultArea').innerHTML = `
        <div class="card">
            <div class="tag">AV BOX INFO</div>
            <div class="id-label">${escHtml(first.id)}</div>
            <div class="stat-banner">
                <div class="stat-box"><div class="label">接頭總數</div><div class="num" style="color:var(--green)">${tConn}</div></div>
                <div class="stat-box"><div class="label">迴路總數</div><div class="num" style="color:var(--blue)">${tCirc}</div></div>
            </div>
            <div class="info-grid">
                <div class="info-item"><div class="label">廳別</div><div class="hall-badge" style="background:${h.color}25;color:${h.color}">${h.name}</div></div>
                <div class="info-item"><div class="label">位置</div><div class="value">${escHtml(first.loc)}</div></div>
            </div>
        </div>
        <div class="card">
            <table>
                <thead><tr><th>系統 / 目的地</th><th>接頭</th><th style="text-align:right">數量</th></tr></thead>
                <tbody>${Array.from(groups.values()).map(g => `
                    <tr>
                        <td><div class="sys-name">${escHtml(g.sys)}</div><div class="dest-info">↳ ${escHtml(g.dest)}</div></td>
                        <td style="font-size:13px;color:var(--text-sub)">${escHtml(g.conn)}</td>
                        <td><span class="qty-main">${g.c_qty}</span><span class="qty-sub">迴路:${g.s_qty}</span></td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
    getEle('resultArea').style.display = 'block';
    getEle('placeholderContainer').style.display = 'none';
}

function showPlaceholder() {
    getEle('placeholderContainer').innerHTML = `<div class="placeholder-wrap"><div class="ph-icon">🔍</div><div class="ph-title">輸入 GT, BB, GP 開始查詢</div><div class="ph-card">範例：搜尋「GT 4F」可找大劇院 4 樓</div></div>`;
}

getEle('searchInput').addEventListener('input', e => {
    const v = e.target.value.trim();
    if (!v) { getEle('suggestions').style.display = 'none'; return; }
    const res = fuzzyMatch(v).slice(0, 10);
    getEle('suggestions').innerHTML = res.map(d => {
        const h = CONFIG.HALL_MAP[d.hall] || { short: '?', color: '#888' };
        return `<div class="sug-item" onclick="renderResult('${d.id}')">
            <div class="sug-header"><span style="font-weight:700">${d.id}</span><span class="sug-hall" style="background:${h.color}20;color:${h.color}">${h.short}</span></div>
            <div class="sug-loc">📍 ${d.loc}</div>
        </div>`;
    }).join('');
    getEle('suggestions').style.display = 'block';
});

getEle('clearBtn').addEventListener('click', () => { getEle('searchInput').value = ''; getEle('resultArea').style.display = 'none'; showPlaceholder(); });

window.onload = loadData;
</script>
</body>
</html>
