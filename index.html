<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AV 迴路盒查詢 | V6.2 Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg:     #000000;
            --card:   rgba(28,28,30,0.95);
            --blue:   #0A84FF;
            --green:  #32D74B;
            --text:   #F5F5F7;
            --sub:    #8E8E93;
            --border: rgba(255,255,255,0.1);
            --sep:    rgba(255,255,255,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "SF Pro Display", "Inter", "-apple-system", sans-serif;
            min-height: 100vh;
            padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
            display: flex; flex-direction: column; align-items: center;
        }

        /* ── Header ── */
        .header {
            width: 100%; padding: 52px 16px 16px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 0.5px solid var(--border);
            position: sticky; top: 0; z-index: 100; text-align: center;
        }
        .header h1 {
            font-size: 26px; font-weight: 700;
            background: linear-gradient(180deg,#fff 0%,#8E8E93 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        /* ── Search Group ── */
        .search-group { display: flex; flex-direction: column; gap: 10px; max-width: 540px; margin: 0 auto; }
        .search-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        
        .search-wrap { position: relative; flex: 1; }
        .search-wrap input {
            width: 100%; background: rgba(255,255,255,0.07); border: 1px solid var(--border);
            border-radius: 14px; padding: 12px 16px; color: #fff; font-size: 16px; outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .search-wrap input:focus { border-color: var(--blue); background: rgba(255,255,255,0.1); }
        .search-wrap input::placeholder { color: rgba(255,255,255,0.3); }
        
        .icon-btn {
            width: 44px; height: 44px; background: rgba(255,255,255,0.07);
            border: 0.5px solid var(--border); border-radius: 12px;
            color: var(--sub); cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: background 0.15s, transform 0.1s;
        }
        
        @media (hover: hover) {
            .icon-btn:hover { border-color: var(--sub); color: #fff; }
            .sug-item:hover { background: rgba(255,255,255,0.08); }
            .id-chip:hover { background: rgba(10, 132, 255, 0.2); border-color: var(--blue); }
        }
        .icon-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.96); }

        /* ── Advanced Faceted Filters ── */
        .filter-panel {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 14px; padding: 12px; width: 100%;
        }
        .filter-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 11px; color: var(--sub); font-weight: 700; letter-spacing: 0.1em; 
            margin-bottom: 10px; padding: 0 4px;
        }
        .clear-filter-btn { color: var(--blue); background: none; border: none; font-size: 11px; font-weight: 600; cursor: pointer; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        select.filter-select {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 8px; color: #fff; font-size: 14px; outline: none;
            appearance: none; -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238E8E93' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 8px center; background-size: 14px;
            text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
            transition: border-color 0.2s;
        }
        select.filter-select:focus { border-color: var(--blue); }

        /* ── ID Chips Wall ── */
        .id-chips-container {
            margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--sep);
            display: flex; flex-wrap: wrap; gap: 8px; max-height: 150px; overflow-y: auto;
        }
        .id-chips-container:empty { display: none; }
        .id-chip {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border);
            border-radius: 8px; padding: 6px 12px; font-size: 14px; font-weight: 600;
            color: var(--text); cursor: pointer; transition: all 0.2s;
            animation: fadeInScale 0.2s ease-out forwards; opacity: 0; transform: scale(0.95);
        }
        .id-chip:active { transform: scale(0.9); background: var(--blue); color: #fff; }
        @keyframes fadeInScale { to { opacity: 1; transform: scale(1); } }
        .chip-empty-msg { width: 100%; text-align: center; font-size: 12px; color: var(--sub); padding: 8px 0; }

        /* ── Suggestions ── */
        .suggestions {
            position: absolute; top: calc(100% + 6px); left: 0; right: 0;
            background: rgba(28,28,30,0.99); border: 0.5px solid var(--border);
            border-radius: 14px; overflow-y: auto; max-height: 40vh;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6); z-index: 200; display: none;
        }
        .sug-item {
            padding: 12px 16px; cursor: pointer; font-size: 15px; border-bottom: 0.5px solid var(--sep);
            display: flex; flex-direction: column; gap: 4px;
        }
        .sug-header { display: flex; justify-content: space-between; align-items: center; }
        .sug-hall { font-size: 11px; font-weight: 700; padding: 2px 6px; border-radius: 6px; }

        /* ── Content & Card ── */
        .content { width: 100%; max-width: 540px; padding: 16px 16px 0; }
        .card { background: var(--card); border: 0.5px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 12px; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tag { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--blue); margin-bottom: 6px; }
        .id-label { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .divider { border: none; border-top: 0.5px solid var(--sep); margin: 14px 0; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .info-item .label { font-size: 12px; color: var(--sub); margin-bottom: 4px; }
        .info-item .value { font-size: 17px; font-weight: 600; line-height: 1.3; }
        .hall-badge { display: inline-flex; align-items: center; padding: 4px 12px; border-radius: 999px; font-size: 16px; font-weight: 700; margin-right: 8px; }

        /* ── Table ── */
        .section-title { font-size: 11px; color: var(--sub); font-weight: 700; letter-spacing: 0.1em; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        thead th { text-align: left; font-size: 12px; color: var(--sub); font-weight: 600; padding: 0 4px 8px; border-bottom: 0.5px solid var(--border); }
        thead th:nth-child(1) { width: 55%; }
        thead th:nth-child(2) { width: 30%; }
        thead th:nth-child(3) { width: 15%; text-align: right; }
        tbody tr { border-bottom: 0.5px solid var(--sep); }
        tbody td { padding: 12px 4px; font-size: 16px; font-weight: 500; color: var(--text); vertical-align: top; word-wrap: break-word; }
        tbody td:last-child { text-align: right; color: #FFFFFF; font-size: 18px; font-weight: 600; }
        .sys-name { font-weight: 600; color: #FFFFFF; }
        .dest-info { font-size: 12px; color: var(--sub); margin-top: 4px; line-height: 1.3; display: flex; gap: 4px; }
        .dest-icon { color: var(--blue); flex-shrink: 0; }

        /* ── Settings ── */
        .settings-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .save-btn { background: var(--blue); color: #fff; border: none; border-radius: 8px; padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .close-settings { background: rgba(255,255,255,0.1); color: #fff; border: none; border-radius: 8px; width: 30px; height: 30px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .alias-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--sep); }
        .alias-orig { font-size: 13px; color: var(--text); flex: 1; word-break: break-all; min-width: 0; }
        .alias-row input { flex: 1; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; outline: none; font-size: 14px; min-width: 0; }
        .placeholder { text-align: center; padding: 60px 20px; color: #3a3a3c; font-size: 12px; letter-spacing: 0.15em; }
    </style>
</head>
<body>

<div class="header">
    <h1>音視訊迴路盒</h1>
    <div class="search-group">
        <div class="search-row">
            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="直接輸入或點選下方條件尋找" autocomplete="off">
                <div id="suggestions" class="suggestions"></div>
            </div>
            <button class="icon-btn" id="clearBtn" title="清除">✕</button>
            <button class="icon-btn" id="settingBtn" title="設定">⚙️</button>
        </div>

        <div class="filter-panel">
            <div class="filter-header">
                <span>📍 空間聯動過濾器</span>
                <button class="clear-filter-btn" id="clearFilterBtn">重置條件</button>
            </div>
            <div class="filter-grid">
                <select id="selHall" class="filter-select"><option value="">🏛️ 廳別</option></select>
                <select id="selFloor" class="filter-select"><option value="">📶 樓層</option></select>
                <select id="selLoc" class="filter-select"><option value="">🎯 位置</option></select>
            </div>
            <div id="filterIdChips" class="id-chips-container"></div>
        </div>
    </div>
</div>

<div class="content">
    <div id="settingsArea" class="card" style="display:none; margin-bottom:12px;">
        <div class="settings-header">
            <span style="font-size:13px; font-weight:600; color:var(--blue);">🛠️ 自訂系統名稱</span>
            <div style="display:flex; gap:8px;">
                <button class="save-btn" id="saveBtn">儲存</button>
                <button class="close-settings" id="closeSettingBtn">✕</button>
            </div>
        </div>
        <div id="aliasList" style="max-height:340px; overflow-y:auto;"></div>
    </div>

    <div id="resultArea" style="display:none"></div>
    <div id="placeholder" class="placeholder">READY TO SCAN</div>
</div>

<script>
const CONFIG = {
    DATA_URL: './data.json',
    STORAGE_KEY: 'avAliases',
    MAX_SUGGESTIONS: 15,
    HALL_ORDER: [
        '大劇院',
        '多形式中劇院',
        '鏡框式中劇院',
        '偶劇院',
        '排練室',
        '屋頂劇場',
        '公共區域',
        '卸貨口與外部空間',
    ],
    HALL_MAP: {
        '大劇院':       { name: 'GT 大劇院',   short: 'GT', color: '#FF3B30' },
        '多形式中劇院': { name: 'BB 藍盒子',   short: 'BB', color: '#5AC8FA' },
        '鏡框式中劇院': { name: 'GP 球劇場',   short: 'GP', color: '#34C759' },
        '偶劇院':       { name: 'PT 偶劇院',   short: 'PT', color: '#FF9F0A' },
        '屋頂劇場':     { name: 'RT 屋頂劇場', short: 'RT', color: '#BF5AF2' },
        '排練室':       { name: '排練室',     short: '練', color: '#64D2FF' },
        '公共區域':     { name: '公共區域',   short: '公共', color: '#8E8E93' },
        '卸貨口與外部空間': { name: '外部空間', short: '外部', color: '#636366' },
    }
};

let db = [];
let uniqueBoxes = []; 
let aliases = {};
let currentId = null;

const safeParse = (str, fb) => { try { return JSON.parse(str) || fb; } catch(e) { return fb; } };
const escHtml = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const getEle = id => document.getElementById(id);

window.addEventListener('DOMContentLoaded', async () => {
    aliases = safeParse(localStorage.getItem(CONFIG.STORAGE_KEY), {});
    bindEvents();
    await loadData();
});

function bindEvents() {
    getEle('searchInput').addEventListener('input', handleMainInput);
    getEle('clearBtn').addEventListener('click', () => { getEle('searchInput').value = ''; getEle('suggestions').style.display = 'none'; showPlaceholder('READY TO SCAN'); });
    getEle('clearFilterBtn').addEventListener('click', resetFilters);
    getEle('settingBtn').addEventListener('click', () => getEle('settingsArea').style.display = getEle('settingsArea').style.display==='none'?'block':'none');
    getEle('closeSettingBtn').addEventListener('click', () => getEle('settingsArea').style.display = 'none');
    getEle('saveBtn').addEventListener('click', saveAliases);

    // 傳入 e (Event) 以便追蹤是哪個欄位觸發了變更
    ['selHall', 'selFloor', 'selLoc'].forEach(id => {
        getEle(id).addEventListener('change', updateFilters);
    });

    document.addEventListener('click', e => {
        const sug = e.target.closest('.sug-item');
        if (sug && sug.dataset.id) return triggerSearch(sug.dataset.id);

        const chip = e.target.closest('.id-chip');
        if (chip && chip.dataset.id) return triggerSearch(chip.dataset.id);

        if (!e.target.closest('.search-wrap')) getEle('suggestions').style.display = 'none';
    });
}

async function loadData() {
    try {
        const res = await fetch(`${CONFIG.DATA_URL}?v=${Date.now()}`);
        const rawDb = await res.json();
        
        db = rawDb.map(d => {
            let floor = '';
            let exactLoc = (d.loc || '').trim();
            const floorMatch = exactLoc.match(/\b(B?\d{1,2}F)\b/i);
            if (floorMatch) {
                floor = floorMatch[1].toUpperCase();
                exactLoc = exactLoc.replace(floorMatch[0], '').trim(); 
            } else {
                const idMatch = (d.id || '').match(/^AV\s*(\d{2})/i);
                if (idMatch) floor = parseInt(idMatch[1], 10) + 'F';
            }
            return { ...d, _floor: floor || '未知樓層', _exactLoc: exactLoc || '一般區域' };
        });

        const seenIds = new Set();
        uniqueBoxes = db.filter(d => {
            if (!d.id || seenIds.has(d.id)) return false;
            seenIds.add(d.id); return true;
        });

        buildAliasEditor();
        populateInitialFilters(); 
    } catch(e) { showPlaceholder('⚠️ 無法載入資料'); }
}

function populateInitialFilters() {
    updateDropdownOptions('selHall', uniqueBoxes.map(d => d.hall));
    updateDropdownOptions('selFloor', uniqueBoxes.map(d => d._floor));
    updateDropdownOptions('selLoc', uniqueBoxes.map(d => d._exactLoc));
}

function updateDropdownOptions(selectId, dataArray) {
    const sel = getEle(selectId);
    const currentVal = sel.value;
    const defaultText = sel.options[0].text; 
    const uniqueVals = [...new Set(dataArray.filter(Boolean))];

    if (selectId === 'selHall') {
        uniqueVals.sort((a, b) => {
            const ia = CONFIG.HALL_ORDER.indexOf(a);
            const ib = CONFIG.HALL_ORDER.indexOf(b);
            const ra = ia === -1 ? Number.MAX_SAFE_INTEGER : ia;
            const rb = ib === -1 ? Number.MAX_SAFE_INTEGER : ib;
            return ra === rb ? a.localeCompare(b, 'zh-TW') : ra - rb;
        });
    } else {
        uniqueVals.sort();
    }
    
    sel.innerHTML = `<option value="">${defaultText}</option>` + 
        uniqueVals.map(v => {
            let displayValue = selectId === 'selHall' ? (CONFIG.HALL_MAP[v]?.name || v) : v;
            return `<option value="${escHtml(v)}">${escHtml(displayValue)}</option>`;
        }).join('');
    
    if (uniqueVals.includes(currentVal)) sel.value = currentVal;
}

function updateFilters(e) {
    let h = getEle('selHall').value;
    let f = getEle('selFloor').value;
    let l = getEle('selLoc').value;
    
    const triggerId = e ? e.target.id : null;

    // 【狀態衝突自癒機制】檢查其他未動過的欄位是否依然合法，不合法則自動清空
    if (triggerId === 'selHall') {
        const validF = uniqueBoxes.filter(d => d.hall === h).map(d => d._floor);
        if (f && !validF.includes(f)) { f = ''; getEle('selFloor').value = ''; }
        
        const validL = uniqueBoxes.filter(d => d.hall === h && (!f || d._floor === f)).map(d => d._exactLoc);
        if (l && !validL.includes(l)) { l = ''; getEle('selLoc').value = ''; }
    } 
    else if (triggerId === 'selFloor') {
        const validH = uniqueBoxes.filter(d => d._floor === f).map(d => d.hall);
        if (h && !validH.includes(h)) { h = ''; getEle('selHall').value = ''; }
        
        const validL = uniqueBoxes.filter(d => d._floor === f && (!h || d.hall === h)).map(d => d._exactLoc);
        if (l && !validL.includes(l)) { l = ''; getEle('selLoc').value = ''; }
    } 
    else if (triggerId === 'selLoc') {
        const validH = uniqueBoxes.filter(d => d._exactLoc === l).map(d => d.hall);
        if (h && !validH.includes(h)) { h = ''; getEle('selHall').value = ''; }
        
        const validF = uniqueBoxes.filter(d => d._exactLoc === l && (!h || d.hall === h)).map(d => d._floor);
        if (f && !validF.includes(f)) { f = ''; getEle('selFloor').value = ''; }
    }

    getEle('suggestions').style.display = 'none';

    // 以修復後的乾淨狀態，重新篩選資料庫
    let filteredBoxes = uniqueBoxes.filter(d => {
        if (h && d.hall !== h) return false;
        if (f && d._floor !== f) return false;
        if (l && d._exactLoc !== l) return false;
        return true;
    });

    // 動態收斂另外兩個下拉選單的選項
    if (!h) updateDropdownOptions('selHall', filteredBoxes.map(d => d.hall));
    if (!f) updateDropdownOptions('selFloor', filteredBoxes.map(d => d._floor));
    if (!l) updateDropdownOptions('selLoc', filteredBoxes.map(d => d._exactLoc));

    // 渲染按鈕牆
    const chipBox = getEle('filterIdChips');
    if (filteredBoxes.length === 0) {
        chipBox.innerHTML = '<div class="chip-empty-msg">⚠️ 無符合條件的迴路盒</div>';
    } else if (!h && !f && !l) {
        chipBox.innerHTML = ''; 
    } else {
        chipBox.innerHTML = filteredBoxes
            .sort((a,b) => a.id.localeCompare(b.id))
            .map((d, i) => `<div class="id-chip" data-id="${escHtml(d.id)}" style="animation-delay:${i*0.02}s">${escHtml(d.id)}</div>`)
            .join('');
    }
}

function resetFilters() {
    ['selHall', 'selFloor', 'selLoc'].forEach(id => getEle(id).value = '');
    populateInitialFilters(); 
    getEle('filterIdChips').innerHTML = ''; 
}

function triggerSearch(id) {
    getEle('searchInput').value = id;
    getEle('suggestions').style.display = 'none';
    renderResult(id);
}

function handleMainInput() {
    const val = getEle('searchInput').value.trim().toUpperCase();
    if (!val) return getEle('suggestions').style.display = 'none';
    
    const sugs = uniqueBoxes.filter(d => d.id.toUpperCase().includes(val)).slice(0, CONFIG.MAX_SUGGESTIONS);
    if(!sugs.length) { getEle('suggestions').style.display = 'none'; return; }
    
    getEle('suggestions').innerHTML = sugs.map(d => {
        const hallInfo = CONFIG.HALL_MAP[d.hall] || { short: d.hall||'?', color: '#8E8E93' };
        return `<div class="sug-item" data-id="${escHtml(d.id)}">
            <div class="sug-header"><span style="font-weight:600">${escHtml(d.id)}</span><span class="sug-hall" style="background:${hallInfo.color}22; color:${hallInfo.color}">${escHtml(hallInfo.short)}</span></div>
        </div>`;
    }).join('');
    getEle('suggestions').style.display = 'block';
}

function renderResult(id) {
    if (!id) return;
    const matches = db.filter(d => d.id === id);
    if (!matches.length) return showPlaceholder('查無此編號');
    
    currentId = id; 
    const first = matches[0];
    const hallInfo = CONFIG.HALL_MAP[first.hall] || { name: first.hall || '—', short: '?', color: '#8E8E93' };

    const groups = new Map();
    matches.forEach(d => {
        const sys = (d.sys && (aliases[d.sys] || d.sys)) || '未命名系統';
        const destInfo = [d.dest?.trim(), d.room?.trim()].filter(Boolean).join(' ') || '未標示目的地';
        const key = `${sys}§${d.conn||'—'}§${destInfo}`;
        if (!groups.has(key)) groups.set(key, { sys, conn: d.conn||'—', destInfo, qty: 0 });
        groups.get(key).qty += parseInt(d.qty, 10) || 0;
    });

    const rows = [...groups.values()].sort((a,b) => a.sys.localeCompare(b.sys,'zh-TW')).map(g => 
        `<tr><td><div class="sys-name">${escHtml(g.sys)}</div><div class="dest-info"><span class="dest-icon">↳</span> <span>${escHtml(g.destInfo)}</span></div></td>
        <td>${g.conn !== '—' ? escHtml(g.conn) : ''}</td><td>${g.qty||'0'}</td></tr>`
    ).join('');

    getEle('resultArea').innerHTML = `
        <div class="card">
            <div class="tag">SYSTEM SCAN OK</div>
            <div class="id-label">${escHtml(first.id)}</div><hr class="divider">
            <div class="info-grid">
                <div class="info-item"><div class="label">廳別</div><div class="value"><span class="hall-badge" style="background:${hallInfo.color}22;color:${hallInfo.color}">${escHtml(hallInfo.short)}</span><span style="font-size:16px;font-weight:500">${escHtml(hallInfo.name)}</span></div></div>
                <div class="info-item"><div class="label">位置</div><div class="value" style="font-size:16px">${escHtml(first.loc||'—')}</div></div>
            </div>
        </div>
        <div class="card"><p class="section-title">接口清單 / INTERFACE LIST</p>
        <table><thead><tr><th>系統 / 目的地</th><th>接頭</th><th>數量</th></tr></thead><tbody>${rows}</tbody></table></div>`;
        
    getEle('resultArea').style.display = 'block'; getEle('placeholder').style.display = 'none';
}

function showPlaceholder(msg) { currentId = null; getEle('resultArea').style.display = 'none'; getEle('placeholder').style.display = 'block'; getEle('placeholder').innerText = msg; }

function buildAliasEditor() {
    const sysNames = [...new Set(db.map(d => d.sys).filter(Boolean))].sort();
    getEle('aliasList').innerHTML = sysNames.map(s => `<div class="alias-row"><span class="alias-orig">${escHtml(s)}</span><input class="alias-input" data-orig="${escHtml(s)}" value="${escHtml(aliases[s]||'')}" placeholder="自訂"></div>`).join('');
}
function saveAliases() {
    document.querySelectorAll('.alias-input').forEach(el => { const v = el.value.trim(); const orig = el.dataset.orig; if(v) aliases[orig] = v; else delete aliases[orig]; });
    localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(aliases));
    if(currentId) renderResult(currentId); getEle('settingsArea').style.display = 'none';
}
</script>
</body>
</html>
