<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AV 迴路盒查詢</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg:     #000000;
            --card:   rgba(28,28,30,0.95);
            --blue:   #0A84FF;
            --green:  #32D74B;
            --text:   #F5F5F7;
            --sub:    #8E8E93;
            --border: rgba(255,255,255,0.1);
            --sep:    rgba(255,255,255,0.06);
        }

        * { box-sizing:border-box; margin:0; padding:0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "SF Pro Display","Inter","-apple-system",sans-serif;
            min-height: 100vh;
            padding-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Header ── */
        .header {
            width: 100%;
            padding: 52px 16px 16px;
            background: rgba(0,0,0,0.75);
            border-bottom: 0.5px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            text-align: center;
        }
        .header h1 {
            font-size: 26px; font-weight: 700;
            background: linear-gradient(180deg,#fff 0%,#8E8E93 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        /* ── Search bar ── */
        .search-bar { display:flex; gap:8px; align-items:center; max-width:540px; margin:0 auto; }
        .search-wrap { position:relative; flex:1; }
        .search-wrap input {
            width:100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 16px;
            color: #fff; font-size: 16px; outline: none;
            transition: border-color 0.2s;
        }
        .search-wrap input:focus { border-color: var(--blue); }
        .icon-btn {
            width:44px; height:44px;
            background: rgba(255,255,255,0.07);
            border: 0.5px solid var(--border);
            border-radius: 12px;
            color: var(--sub); cursor:pointer; font-size:16px;
            display:flex; align-items:center; justify-content:center; flex-shrink:0;
            transition: background 0.15s;
        }
        .icon-btn:active { background: rgba(255,255,255,0.15); }

        /* ── Suggestions ── */
        .suggestions {
            position:absolute; top:100%; left:0; right:0;
            background: rgba(28,28,30,0.99);
            border: 0.5px solid var(--border);
            border-radius: 14px; margin-top:6px;
            overflow-y:auto; max-height:260px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            z-index: 200;
        }
        .sug-item {
            padding: 12px 16px; cursor:pointer; font-size:15px;
            border-bottom: 0.5px solid var(--sep);
            display:flex; justify-content:space-between; align-items:center;
        }
        .sug-item:last-child { border-bottom:none; }
        .sug-item.active, .sug-item:active { background: rgba(255,255,255,0.08); }
        .sug-hall { font-size:11px; font-weight:700; }

        /* ── Content ── */
        .content { width:100%; max-width:540px; padding:16px 16px 0; }

        /* ── Card ── */
        .card {
            background: var(--card);
            border: 0.5px solid var(--border);
            border-radius: 20px;
            padding: 20px; margin-bottom:12px;
        }

        .tag { font-size:10px; font-weight:700; letter-spacing:0.12em; color:var(--blue); margin-bottom:6px; }
        .id-label { font-size:30px; font-weight:700; letter-spacing:-0.02em; }
        .divider { border:none; border-top:0.5px solid var(--sep); margin:14px 0; }

        .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .info-item .label { font-size:12px; color:var(--sub); margin-bottom:4px; }
        .info-item .value { font-size:17px; font-weight:600; }

        .hall-badge {
            display:inline-flex; align-items:center;
            padding:4px 12px; border-radius:999px;
            font-size:16px; font-weight:700;
        }

        /* ── Table ── */
        .section-title { font-size:11px; color:var(--sub); font-weight:700; letter-spacing:0.1em; margin-bottom:10px; }
        table { width:100%; border-collapse:collapse; }
        thead th {
            text-align:left; font-size:12px; color:var(--sub); font-weight:600;
            padding:0 8px 8px; border-bottom:0.5px solid var(--border);
        }
        thead th:last-child { text-align:right; }
        tbody tr { border-bottom:0.5px solid var(--sep); }
        tbody tr:last-child { border-bottom:none; }
        
        /* 🌟 表格字體放大與醒目化 */
        tbody td { 
            padding: 14px 8px; 
            font-size: 17px; 
            font-weight: 500;
            color: var(--text);
            vertical-align: middle; 
        }
        tbody td:last-child { 
            text-align: right; 
            color: #FFFFFF; 
            font-size: 18px; 
            font-weight: 600;
            white-space: nowrap; 
        }
        .sys-name { font-weight: 600; color: #FFFFFF; }
        
        .conn-tag {
            display:inline-block; margin-top:3px; font-size:11px;
            color:var(--sub); background:rgba(255,255,255,0.05);
            border-radius:6px; padding:1px 7px;
        }
        .dest-cell { font-size:12px; color:var(--sub); line-height:1.9; }

        /* ── Settings ── */
        .settings-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .settings-title { font-size:13px; font-weight:600; color:var(--blue); }
        .save-btn {
            background:var(--blue); color:#fff; border:none;
            border-radius:8px; padding:6px 16px;
            font-size:13px; font-weight:600; cursor:pointer;
        }
        .alias-list { max-height:340px; overflow-y:auto; }
        .alias-row {
            display:flex; align-items:center; gap:10px;
            padding:8px 0; border-bottom:0.5px solid var(--sep);
        }
        .alias-row:last-child { border-bottom:none; }
        .alias-orig { font-size:13px; color:var(--text); flex:1; word-break:break-all; min-width:0; }
        .alias-row input {
            flex:1; padding:7px 10px;
            border-radius:8px; border:1px solid var(--border);
            background:rgba(255,255,255,0.05); color:#fff;
            outline:none; font-size:14px; min-width:0;
        }

        /* ── Placeholder ── */
        .placeholder { text-align:center; padding:60px 20px; color:#3a3a3c; font-size:12px; letter-spacing:0.15em; }

        .suggestions::-webkit-scrollbar,
        .alias-list::-webkit-scrollbar { display:none; }
    </style>
</head>
<body>

<div class="header">
    <h1>音視訊迴路盒</h1>
    <div class="search-bar">
        <div class="search-wrap">
            <input type="text" id="searchInput"
                placeholder="輸入編號，如 AV 01-01 或 #1001"
                autocomplete="off"
                oninput="handleInput()"
                onkeydown="handleKey(event)">
            <div id="suggestions" class="suggestions" style="display:none"></div>
        </div>
        <button class="icon-btn" onclick="clearSearch()">✕</button>
        <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
    </div>
</div>

<div class="content">

    <div id="settingsArea" class="card" style="display:none;margin-bottom:12px">
        <div class="settings-header">
            <span class="settings-title">🛠️ 自訂系統名稱</span>
            <button class="save-btn" id="saveBtn" onclick="saveAliases()">儲存</button>
        </div>
        <div id="aliasList" class="alias-list">
            <p style="font-size:13px;color:var(--sub)">載入中…</p>
        </div>
    </div>

    <div id="resultArea" style="display:none"></div>

    <div id="placeholder" class="placeholder">READY TO SCAN</div>

</div>

<script>
/* ══════════════════════════════════════════════════════════
   CENTRAL CONFIG
   ══════════════════════════════════════════════════════════ */
const HALL_MAP = {
    '大劇院':           { short:'GT',   color:'#FF3B30' },
    '多形式中劇院':     { short:'BB',   color:'#5AC8FA' },
    '鏡框式中劇院':     { short:'GP',   color:'#34C759' },
    '偶劇院':           { short:'PT',   color:'#FF9F0A' },
    '屋頂劇場':         { short:'RT',   color:'#BF5AF2' },
    '排練室':           { short:'練',   color:'#64D2FF' },
    '公共區域':         { short:'公共', color:'#8E8E93' },
    '卸貨口與外部空間': { short:'外部', color:'#636366' },
};

/* ══════════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════════ */
let db      = [];
let aliases = JSON.parse(localStorage.getItem('avAliases') || '{}');
let sugIdx  = -1;

/* ══════════════════════════════════════════════════════════
   DATA LOADING
   ══════════════════════════════════════════════════════════ */
async function loadData() {
    try {
        const r = await fetch('./data.json');
        db = await r.json();
        buildAliasEditor();
    } catch(e) {
        document.getElementById('placeholder').innerText = '⚠️ 無法載入 data.json，請確認檔案位置';
    }
}

/* ══════════════════════════════════════════════════════════
   ID NORMALIZER
   支援輸入格式：AV 01-01 / av0101 / 01-01 / #1001 / 1001
   ══════════════════════════════════════════════════════════ */
function buildCandidates(raw) {
    const s = raw.trim().toUpperCase().replace(/\s+/g, ' ');
    if (!s) return [];

    const set = new Set([s]);

    if (s.startsWith('#')) {
        set.add(s.slice(1));
    } else {
        set.add('#' + s);
        set.add('#' + s.replace(/\s/g, ''));
    }

    const noPrefix = s.replace(/^AV\s*/, '');
    set.add('AV ' + noPrefix);
    // Handle zero-padded: "0101" → "01-01"
    set.add('AV ' + noPrefix.replace(/^(\d{2})(\d{2})$/, '$1-$2'));

    return Array.from(set);
}

/* ══════════════════════════════════════════════════════════
   SEARCH HANDLERS
   ══════════════════════════════════════════════════════════ */
function handleInput() {
    const val = document.getElementById('searchInput').value;
    sugIdx = -1;
    if (!val.trim()) { clearSearch(); return; }

    const candidates = buildCandidates(val);
    const q = val.trim().toUpperCase();

    const seen = new Set();
    const sugs = [];
    for (const d of db) {
        if (seen.has(d.id)) continue;
        const id = d.id.toUpperCase();
        if (candidates.some(c => id === c) || id.includes(q)) {
            seen.add(d.id);
            sugs.push(d);
        }
        if (sugs.length >= 15) break;
    }

    if (!sugs.length) {
        hideSuggestions();
        showPlaceholder('查無此編號');
        return;
    }

    // Exact single match → show result directly
    if (sugs.length === 1 && candidates.some(c => sugs[0].id.toUpperCase() === c)) {
        hideSuggestions();
        renderResult(sugs[0].id);
        return;
    }

    renderSuggestions(sugs);
}

function handleKey(e) {
    const box   = document.getElementById('suggestions');
    const items = box.querySelectorAll('.sug-item');
    if (box.style.display === 'none' || !items.length) {
        if (e.key === 'Enter') handleInput();
        return;
    }
    if      (e.key === 'ArrowDown') { sugIdx = Math.min(sugIdx + 1, items.length - 1); highlightSug(items); e.preventDefault(); }
    else if (e.key === 'ArrowUp')   { sugIdx = Math.max(sugIdx - 1, -1);               highlightSug(items); e.preventDefault(); }
    else if (e.key === 'Enter')     { sugIdx >= 0 ? items[sugIdx].click() : handleInput(); }
    else if (e.key === 'Escape')    { hideSuggestions(); }
}

function highlightSug(items) {
    items.forEach((el, i) => el.classList.toggle('active', i === sugIdx));
}

function renderSuggestions(sugs) {
    const unique = [...new Map(sugs.map(d => [d.id, d])).values()];
    document.getElementById('suggestions').innerHTML = unique.map(d => {
        const hall = HALL_MAP[d.hall] || { short: d.hall, color: '#8E8E93' };
        return `<div class="sug-item" onclick="selectSug('${d.id.replace(/'/g, "\\'")}')">
            <span>${d.id}</span>
            <span class="sug-hall" style="color:${hall.color}">${hall.short}</span>
        </div>`;
    }).join('');
    document.getElementById('suggestions').style.display = 'block';
}

function hideSuggestions() {
    document.getElementById('suggestions').style.display = 'none';
}

function selectSug(id) {
    document.getElementById('searchInput').value = id;
    hideSuggestions();
    renderResult(id);
}

/* ══════════════════════════════════════════════════════════
   RESULT RENDERER
   ══════════════════════════════════════════════════════════ */
function renderResult(id) {
    const matches = db.filter(d => d.id === id);
    if (!matches.length) { showPlaceholder('查無此編號'); return; }

    const first = matches[0];
    const hall  = HALL_MAP[first.hall] || { short: first.hall, color: '#8E8E93' };

    // Group by sys + conn，加總數量，彙整目的地
    const groups = new Map();
    for (const d of matches) {
        const sys  = (d.sys && (aliases[d.sys] || d.sys)) || '—';
        const conn = d.conn || '—';
        const key  = sys + '§' + conn;
        if (!groups.has(key)) groups.set(key, { sys, conn, qty: 0, dests: new Set() });
        const g = groups.get(key);
        g.qty += d.qty || 0;
        const dest = [d.dest, d.room, d.rack, d.dev].filter(Boolean).join(' / ');
        if (dest) g.dests.add(dest);
    }

    const tableRows = [...groups.values()]
        .sort((a, b) => {
            if (a.sys !== b.sys) return a.sys.localeCompare(b.sys, 'zh-TW');
            return a.conn.localeCompare(b.conn, 'zh-TW');
        })
        .map(g => `
        <tr>
            <td><div class="sys-name">${g.sys}</div></td>
            <td>${g.conn !== '—' ? g.conn : ''}</td>
            <td>${g.qty || '—'}</td>
        </tr>`
    ).join('');
    
    document.getElementById('resultArea').innerHTML = `
        <div class="card">
            <div class="tag">SYSTEM SCAN OK</div>
            <div class="id-label">${first.id}</div>
            <hr class="divider">
            <div class="info-grid">
                <div class="info-item">
                    <div class="label">廳別</div>
                    <div class="value">
                        <span class="hall-badge" style="background:${hall.color}22;color:${hall.color}">${hall.short}</span>
                        <span style="font-size:12px;color:var(--sub);margin-left:6px">${first.hall}</span>
                    </div>
                </div>
                <div class="info-item">
                    <div class="label">位置</div>
                    <div class="value" style="font-size:16px">${first.loc || '—'}</div>
                </div>
            </div>
        </div>
        <div class="card">
            <p class="section-title">接口清單 / INTERFACE LIST</p>
            <table>
                <thead>
                    <tr><th>系統</th><th>接頭</th><th>數量</th></tr>
                </thead>
                <tbody>${tableRows}</tbody>
            </table>
        </div>`;

    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
}

/* ══════════════════════════════════════════════════════════
   HELPERS
   ══════════════════════════════════════════════════════════ */
function showPlaceholder(msg) {
    document.getElementById('resultArea').style.display = 'none';
    const el = document.getElementById('placeholder');
    el.style.display = 'block';
    el.innerText = msg;
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    hideSuggestions();
    showPlaceholder('READY TO SCAN');
}

/* ══════════════════════════════════════════════════════════
   ALIAS SETTINGS
   ══════════════════════════════════════════════════════════ */
function buildAliasEditor() {
    const systems = [...new Set(db.map(d => d.sys).filter(Boolean))].sort();
    document.getElementById('aliasList').innerHTML = systems.map(s => `
        <div class="alias-row">
            <span class="alias-orig">${s}</span>
            <input class="alias-input" data-orig="${s}"
                value="${aliases[s] || ''}" placeholder="自訂名稱（可留空）">
        </div>`
    ).join('');
}

function saveAliases() {
    aliases = {};
    document.querySelectorAll('.alias-input').forEach(el => {
        const v = el.value.trim();
        if (v) aliases[el.dataset.orig] = v;
    });
    localStorage.setItem('avAliases', JSON.stringify(aliases));
    const btn = document.getElementById('saveBtn');
    btn.innerText = '✅ 已儲存'; btn.style.background = 'var(--green)';
    setTimeout(() => { btn.innerText = '儲存'; btn.style.background = 'var(--blue)'; }, 1500);
    const val = document.getElementById('searchInput').value.trim();
    if (val) handleInput();
}

function toggleSettings() {
    const el = document.getElementById('settingsArea');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) hideSuggestions();
});

window.onload = loadData;
</script>
</body>
</html>
