<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AV 迴路盒管理系統 | 墨齋架構師版</title>
    <!-- 核心相容性：使用單一 HTML 整合 Babel 與 Tailwind -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

        :root {
            --bg: #000000;
            --card: #151517;
            --blue: #0A84FF;
            --border: rgba(255,255,255,0.12);
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Inter', 'Noto+Sans+TC', sans-serif;
            -webkit-font-smoothing: antialiased;
            /* 深度防禦：移動端優先，安全區域處理 */
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* 跑馬燈改良：包含首幀停留邏輯，增強 UX 可讀性 */
        .marquee-container { 
            display: block;
            width: 100%;
            overflow: hidden; 
            white-space: nowrap; 
        }
        .marquee-content {
            display: inline-block;
            padding-right: 100%; /* 確保尾部留白 */
            animation: marquee-scroll 12s linear infinite;
            animation-play-state: paused;
        }
        /* 僅在文字過長並 hover 時啟動跑馬燈 */
        @media (hover: hover) {
            .marquee-container:hover .marquee-content {
                animation-play-state: running;
            }
        }
        @keyframes marquee-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* 防殘留機制：僅在支援 hover 的設備啟用卡片互動效果 */
        @media (hover: hover) {
            .hover-effect {
                transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
                border: 1px solid transparent;
            }
            .hover-effect:hover {
                background: rgba(255, 255, 255, 0.08);
                border-color: var(--blue);
            }
        }

        /* 渲染優化：硬體加速動畫 */
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            will-change: transform, opacity;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 自定義滾動條與輸入框清理 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        input[type="search"]::-webkit-search-cancel-button { -webkit-appearance: none; display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

<div id="root" class="w-full"></div>

<!-- 中央集權與動態判斷 CONFIG -->
<script type="text/babel">
const CENTRAL_CONFIG = {
    DATA_URL: 'data.json',
    STORAGE_KEY: 'av_architect_aliases_v13',
    MIN_SEARCH_LENGTH: 1,
    REGEX: {
        // 極致相容性：避免 Lookbehind Regex，單純切割空白字元
        SEARCH_SPLIT: /\s+/
    },
    HALL_MAP: {
        '大劇院':           { label: 'GT 大劇院',   color: 'text-red-500',   bg: 'bg-red-500/10',    border: 'border-red-500/20' },
        '多形式中劇院':     { label: 'BB 藍盒子',   color: 'text-sky-400',   bg: 'bg-sky-400/10',    border: 'border-sky-400/20' },
        '鏡框式中劇院':     { label: 'GP 球劇場',   color: 'text-green-400', bg: 'bg-green-400/10',  border: 'border-green-400/20' },
        '偶劇院':           { label: 'PT 偶劇院',   color: 'text-orange-400',bg: 'bg-orange-400/10', border: 'border-orange-400/20' },
        '排練室':           { label: '排練室',      color: 'text-teal-400',  bg: 'bg-teal-400/10',   border: 'border-teal-400/20' },
        '屋頂劇場':         { label: 'RT 屋頂劇場', color: 'text-purple-400',bg: 'bg-purple-400/10', border: 'border-purple-400/20' },
        '公共區域':         { label: '公共區域',    color: 'text-gray-400',  bg: 'bg-gray-400/10',   border: 'border-gray-400/20' },
        '卸貨口與外部空間': { label: '外部空間',    color: 'text-gray-500',  bg: 'bg-gray-500/10',   border: 'border-gray-500/20' }
    }
};

// Helper Tools 深度防禦與 DRY 原則
const Helper = {
    clean: (str) => (str ? String(str).replace(/[\n\r]/g, ' ').trim() : ""),
    safeNum: (val) => Number(val) || 0,
    getHallInfo: (hallStr) => {
        if (!hallStr) return { label: '未知區域', color: 'text-white', bg: 'bg-white/10', border: 'border-white/20' };
        const key = Object.keys(CENTRAL_CONFIG.HALL_MAP).find(k => hallStr.includes(k));
        return CENTRAL_CONFIG.HALL_MAP[key] || { label: hallStr, color: 'text-gray-300', bg: 'bg-gray-400/10', border: 'border-gray-400/20' };
    },
    // 用於構建唯一資料鍵值，確保聚合精確度
    buildUniqueKey: (item) => {
        return [
            item.id, Helper.clean(item.hall), Helper.clean(item.loc), 
            item.sys, item.conn, item.dest, item.room, item.rack, item.dev
        ].map(s => String(s || '').trim()).join('|');
    }
};

const App = () => {
    // State 集中管理
    const [aggregatedData, setAggregatedData] = React.useState([]);
    const [uniqueSystems, setUniqueSystems] = React.useState([]);
    const [searchQuery, setSearchQuery] = React.useState("");
    const [isSettingsOpen, setIsSettingsOpen] = React.useState(false);
    const [isLoading, setIsLoading] = React.useState(true);
    const [userAliases, setUserAliases] = React.useState(() => {
        try {
            const saved = localStorage.getItem(CENTRAL_CONFIG.STORAGE_KEY);
            return saved ? JSON.parse(saved) : {};
        } catch(e) {
            return {};
        }
    });

    // 生命週期完整性：資料獲取與卸載防護
    React.useEffect(() => {
        const controller = new AbortController();
        
        fetch(CENTRAL_CONFIG.DATA_URL, { signal: controller.signal })
            .then(res => {
                if (!res.ok) throw new Error("Network response was not ok");
                return res.json();
            })
            .then(data => {
                // 資料聚合前處理：將數量在源頭聚合，減輕 Render 負擔
                const map = new Map();
                const sysSet = new Set();

                (data || []).forEach(item => {
                    const id = item.id?.trim();
                    const sys = item.sys?.trim();
                    if (!id || !sys) return; // 防禦：略過無效資料

                    const key = Helper.buildUniqueKey(item);
                    
                    if (!map.has(key)) {
                        map.set(key, {
                            ...item,
                            hall: Helper.clean(item.hall),
                            loc: Helper.clean(item.loc),
                            room: Helper.clean(item.room),
                            dest: item.dest?.trim() || "",
                            rack: item.rack?.trim() || "",
                            dev: item.dev?.trim() || "",
                            sys: sys,
                            conn_qty: 0,
                            circuit_qty: 0,
                            u_qty: 0
                        });
                    }
                    
                    const entry = map.get(key);
                    // 確保三個維度的數值安全加總
                    entry.conn_qty += Helper.safeNum(item.conn_qty);
                    entry.circuit_qty += Helper.safeNum(item.circuit_qty);
                    entry.u_qty += Helper.safeNum(item.u_qty);
                    
                    sysSet.add(sys);
                });

                setAggregatedData(Array.from(map.values()));
                setUniqueSystems(Array.from(sysSet).sort());
                setIsLoading(false);
            })
            .catch(err => {
                if (err.name !== 'AbortError') {
                    console.error("Data Audit Failed:", err);
                    setIsLoading(false);
                }
            });

        return () => controller.abort(); // Unmount 清理邏輯
    }, []);

    // 搜尋引擎核心 (O(N) 過濾，按 ID 分組)
    const searchResults = React.useMemo(() => {
        if (searchQuery.trim().length < CENTRAL_CONFIG.MIN_SEARCH_LENGTH) return {};
        
        const tokens = searchQuery.toUpperCase().trim().split(CENTRAL_CONFIG.REGEX.SEARCH_SPLIT);
        const groups = {};

        aggregatedData.forEach(item => {
            const alias = userAliases[item.sys] || item.sys || '';
            // 建立完整搜尋索串
            const searchStr = `${item.id} ${item.hall} ${item.loc} ${item.sys} ${item.conn} ${item.dest} ${item.room} ${item.rack} ${item.dev} ${alias}`.toUpperCase();
            
            const isMatch = tokens.every(t => searchStr.includes(t));
            
            if (isMatch) {
                if (!groups[item.id]) groups[item.id] = [];
                groups[item.id].push({ ...item, alias });
            }
        });

        return groups;
    }, [searchQuery, aggregatedData, userAliases]);

    // 處理 Modal 關閉後的 UI 狀態 (非同步防護)
    const handleCloseSettings = () => {
        requestAnimationFrame(() => {
            setIsSettingsOpen(false);
        });
    };

    return (
        <div className="max-w-2xl mx-auto px-4 pt-8 w-full pb-20">
            {/* Header / Search Bar */}
            <header className="sticky top-0 z-40 bg-black/85 backdrop-blur-xl pb-6 pt-2 border-b border-white/10">
                <div className="flex justify-between items-end mb-4">
                    <div>
                        <h1 className="text-2xl md:text-3xl font-black tracking-tight text-white">音視訊迴路盒</h1>
                        <p className="text-blue-500 text-[10px] font-bold tracking-[0.2em] uppercase mt-1">Architecture V13.1</p>
                    </div>
                </div>
                
                <div className="flex gap-2">
                    <div className="relative flex-1">
                        <input 
                            type="search"
                            disabled={isLoading}
                            placeholder={isLoading ? "載入資料中..." : "搜尋編號、廳別、線材、接頭..."}
                            className="w-full bg-white/10 border border-transparent focus:border-blue-500 focus:bg-white/15 focus:ring-4 focus:ring-blue-500/20 rounded-2xl px-5 py-4 text-base outline-none transition-all placeholder:text-white/30"
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                        />
                    </div>
                    <button 
                        onClick={() => setIsSettingsOpen(!isSettingsOpen)}
                        disabled={isLoading}
                        className={`w-14 h-14 rounded-2xl flex items-center justify-center text-xl transition-all ${isSettingsOpen ? 'bg-blue-600' : 'bg-white/10 hover:bg-white/15 active:scale-95'}`}
                        title="自訂系統別名"
                    >
                        ⚙️
                    </button>
                </div>
            </header>

            {/* Main Content Area */}
            <main className="mt-8 space-y-6">
                
                {/* 設置面板 */}
                {isSettingsOpen && (
                    <section className="bg-[#1c1c1e] border border-blue-500/30 rounded-3xl p-6 animate-slide-up shadow-2xl shadow-black">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-lg font-bold text-blue-400 flex items-center gap-2">
                                <span className="text-xl">🛠️</span> 系統別名設定
                            </h2>
                            <div className="flex gap-2">
                                <button 
                                    onClick={handleCloseSettings} 
                                    className="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-xl text-sm font-bold transition-colors"
                                >
                                    完成
                                </button>
                            </div>
                        </div>
                        <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                            {uniqueSystems.map(sys => (
                                <div key={sys} className="flex flex-col gap-1.5 p-3 bg-black/30 rounded-xl border border-white/5">
                                    <label className="text-[11px] text-gray-400 truncate select-none">{sys}</label>
                                    <input 
                                        className="bg-white/5 border border-white/10 rounded-lg px-3 py-2 text-sm focus:border-blue-500 focus:bg-white/10 outline-none transition-colors"
                                        placeholder="輸入易讀的別名..."
                                        value={userAliases[sys] || ""}
                                        onChange={(e) => {
                                            const next = { ...userAliases };
                                            if(e.target.value.trim() === '') {
                                                delete next[sys];
                                            } else {
                                                next[sys] = e.target.value;
                                            }
                                            setUserAliases(next);
                                            localStorage.setItem(CENTRAL_CONFIG.STORAGE_KEY, JSON.stringify(next));
                                        }}
                                    />
                                </div>
                            ))}
                        </div>
                    </section>
                )}

                {/* 搜尋結果渲染 */}
                {!isSettingsOpen && searchQuery.trim() && Object.keys(searchResults).length > 0 && (
                    <div className="text-[11px] font-bold text-gray-500 tracking-wider uppercase mb-2 ml-2">
                        共找到 {Object.keys(searchResults).length} 個面板
                    </div>
                )}

                {!isSettingsOpen && Object.keys(searchResults).map((id, idx) => {
                    const items = searchResults[id];
                    const base = items[0];
                    const hallInfo = Helper.getHallInfo(base.hall);
                    
                    return (
                        <div key={id} className="animate-slide-up bg-[#151517] border border-white/10 rounded-[28px] overflow-hidden shadow-2xl" style={{animationDelay: `${idx * 0.04}s`}}>
                            <div className="p-5 md:p-6">
                                {/* 卡片標頭：盤號與位置 */}
                                <div className="flex justify-between items-start mb-5 pb-5 border-b border-white/10">
                                    <div className="flex-1 pr-4">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className={`px-3 py-1 rounded-full text-[10px] font-bold tracking-widest uppercase border ${hallInfo.bg} ${hallInfo.color} ${hallInfo.border}`}>
                                                {hallInfo.label}
                                            </span>
                                        </div>
                                        <h2 className="text-3xl font-black tracking-tighter text-white break-all">{id}</h2>
                                    </div>
                                    <div className="text-right flex-shrink-0 max-w-[45%]">
                                        <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1">Location</p>
                                        <p className="text-sm font-bold text-gray-300 leading-snug break-words">{base.loc}</p>
                                    </div>
                                </div>

                                {/* 迴路細節列表 */}
                                <div className="space-y-2">
                                    {items.map((item, iIndex) => {
                                        const destText = [item.dest, item.room].filter(Boolean).join(' ');
                                        const rackDevText = [item.rack, item.dev].filter(Boolean).join(' / ');

                                        return (
                                            <div key={iIndex} className="bg-white/5 rounded-2xl p-4 hover-effect flex flex-col md:flex-row md:items-center gap-4">
                                                
                                                {/* 左側：系統與路徑資訊 */}
                                                <div className="flex-1 min-w-0">
                                                    <div className="text-blue-400 font-bold text-[15px] mb-1.5 marquee-container">
                                                        <span className="marquee-content">{item.alias}</span>
                                                    </div>
                                                    
                                                    <div className="flex flex-wrap items-center gap-2 mt-1">
                                                        {item.conn && (
                                                            <span className="text-[10px] font-mono text-gray-400 bg-black/40 border border-white/10 px-2 py-0.5 rounded uppercase flex-shrink-0">
                                                                🔌 {item.conn}
                                                            </span>
                                                        )}
                                                        {destText && (
                                                            <span className="text-[11px] text-gray-400 flex items-center gap-1 truncate">
                                                                <span className="text-blue-500 opacity-60 font-bold">↳</span> {destText}
                                                            </span>
                                                        )}
                                                    </div>
                                                    
                                                    {rackDevText && (
                                                        <div className="text-[11px] text-gray-500 mt-2 truncate">
                                                            {rackDevText}
                                                        </div>
                                                    )}
                                                </div>

                                                {/* 右側：三維度數量數據 */}
                                                <div className="flex gap-4 md:justify-end bg-black/20 rounded-xl p-3 md:bg-transparent md:p-0 md:border-none border border-white/5">
                                                    <div className="text-center flex-1 md:flex-none">
                                                        <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-0.5">接頭</p>
                                                        <p className="text-lg font-mono font-bold text-white">{item.conn_qty}</p>
                                                    </div>
                                                    <div className="text-center flex-1 md:flex-none border-l border-white/10 md:border-none pl-4 md:pl-0">
                                                        <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-0.5">迴路</p>
                                                        <p className="text-lg font-mono font-bold text-blue-400">{item.circuit_qty}</p>
                                                    </div>
                                                    <div className="text-center flex-1 md:flex-none border-l border-white/10 md:border-none pl-4 md:pl-0">
                                                        <p className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-0.5">U數</p>
                                                        <p className="text-lg font-mono font-bold text-green-400">{item.u_qty}</p>
                                                    </div>
                                                </div>
                                                
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    );
                })}

                {/* 空白狀態 / 找不到資料 */}
                {!isSettingsOpen && searchQuery.trim() && Object.keys(searchResults).length === 0 && (
                    <div className="text-center py-20 text-gray-500 font-medium animate-slide-up">
                        <div className="text-4xl mb-3">📭</div>
                        未找到符合「{searchQuery}」的迴路盒資料
                    </div>
                )}
                
                {/* 初始佔位符 */}
                {!isSettingsOpen && !searchQuery.trim() && !isLoading && (
                    <div className="flex flex-col items-center justify-center py-24 opacity-30">
                        <div className="text-6xl mb-5">⚡</div>
                        <p className="text-sm font-bold tracking-widest uppercase">系統準備就緒</p>
                    </div>
                )}

            </main>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<!-- 核心依賴 CDN：確保順序為 React -> ReactDOM -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

</body>
</html>
